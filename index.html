<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Хогвартс: Хроники Флуда</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.84/dist/rexvirtualjoystickplugin.min.js"></script>    
    <style>
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            filter: grayscale(10%) sepia(5%) brightness(90%) contrast(110%);
            touch-action: none;
        }
        #noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            animation: noise-shift 0.5s steps(3) infinite;
        }
        @keyframes noise-shift {
            0% { background-position: 0 0; }
            33% { background-position: 64px 32px; }
            66% { background-position: 128px 64px; }
            100% { background-position: 192px 96px; }
        }
        #scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
        }
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 12;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
        }
    </style>
</head>
<body>
<div id="noise-overlay"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<script>
window.onload = function() {

    const S = 3;

    // ==================== СЦЕНА 0: СТАРТ ====================
    class StartScene extends Phaser.Scene {
        constructor() { super('StartScene'); }

        preload() {
            this.load.image('seva', 'Sprite-seva-glav-vniz.png');
            this.load.image('krovat', 'Sprite-krovat.png');
            this.load.image('kamin', 'Sprite-kamin.png');
            this.load.image('komod', 'Sprite-komod.png');
        }

        create() {
            const W = 640, H = 480;
            this.cameras.main.setBackgroundColor('#0a0a2e');

            for (let i = 0; i < 50; i++) {
                const x = Phaser.Math.Between(0, W), y = Phaser.Math.Between(0, H);
                const s = Phaser.Math.Between(1, 3), a = Phaser.Math.Between(3, 10) / 10;
                this.add.rectangle(x, y, s, s, 0xffffff, a);
            }

            const title = this.add.text(W/2, 120, 'ХРОНИКИ ФЛУДА', {
                fontSize: '28px', fill: '#ffdd00', fontFamily: 'monospace',
                stroke: '#000000', strokeThickness: 4
            }); title.x = W/2 - title.width/2;

            const sub = this.add.text(W/2, 165, 'История одного дня рождения', {
                fontSize: '12px', fill: '#aaaaaa', fontFamily: 'monospace'
            }); sub.x = W/2 - sub.width/2;

            const btn = this.add.text(W/2, 300, '[ СТАРТ ]', {
                fontSize: '24px', fill: '#ffffff', fontFamily: 'monospace',
                stroke: '#000000', strokeThickness: 3,
                backgroundColor: '#333366', padding: { x: 20, y: 10 }
            }); btn.x = W/2 - btn.width/2;
            btn.setInteractive({ useHandCursor: true });
            btn.on('pointerover', () => btn.setFill('#ffdd00'));
            btn.on('pointerout', () => btn.setFill('#ffffff'));
            btn.on('pointerdown', () => {
                this.cameras.main.fadeOut(800, 0, 0, 0);
                this.time.delayedCall(800, () => this.scene.start('RoomScene'));
            });

            // Кнопка ФУЛСКРИН
            const fullBtn = this.add.text(W/2, 360, '[ НА ВЕСЬ ЭКРАН ]', {
                fontSize: '14px', fill: '#88aacc', fontFamily: 'monospace',
                stroke: '#000000', strokeThickness: 2,
                backgroundColor: '#222244', padding: { x: 12, y: 6 }
            });
            fullBtn.x = W/2 - fullBtn.width/2;
            fullBtn.setInteractive({ useHandCursor: true });
            fullBtn.on('pointerover', () => fullBtn.setFill('#ffdd00'));
            fullBtn.on('pointerout', () => fullBtn.setFill('#88aacc'));
            fullBtn.on('pointerdown', () => {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            });            

            const hint = this.add.text(W/2, 440, 'Нажми СТАРТ или пробел', {
                fontSize: '10px', fill: '#666688', fontFamily: 'monospace'
            }); hint.x = W/2 - hint.width/2;

            this.input.keyboard.addKey('SPACE').on('down', () => {
                this.cameras.main.fadeOut(800, 0, 0, 0);
                this.time.delayedCall(800, () => this.scene.start('RoomScene'));
            });

            this.input.keyboard.addKey('THREE').on('down', () => {
                this.cameras.main.fadeOut(500, 0, 0, 0);
                this.time.delayedCall(500, () => this.scene.start('TomScene'));
            });

            this.cameras.main.fadeIn(1500, 0, 0, 0);
            console.log('✅ Сцена 0');
        }
    }

    // ==================== СЦЕНА 1: КОМНАТА СЕВЫ (с джойстиком) ====================
    class RoomScene extends Phaser.Scene {
        constructor() { super('RoomScene'); }

        create() {
            const W = 640, H = 480;
            if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = false;
            this.physics.world.drawDebug = false;

            this.player = null; this.wasd = {}; this.actionButton = null;
            this.currentAction = null; this.thoughtText = null; this.actionKey = null;
            this.showDebug = false; this.fKey = null; this.fWasDown = false;
            this.showZones = false; this.gKey = null; this.gWasDown = false;
            this.qKey = null; this.qWasDown = false;
            this.hKey = null; this.hWasDown = false; this.showCoords = false; this.coordsText = null;
            this.storyStep = 0; this.hasFluePowder = false; this.isInBed = false;
            this.inventory = []; this.inventoryText = null; this.inventoryBg = null;
            this.invTitle = null; this.showInventory = false;
            this.zoneGraphics = null;
            this.speedReady = false;
            this.joyStick = null; this.actionBtn = null;

            this.cameras.main.setBounds(0, 0, W, H);
            this.physics.world.setBounds(0, 0, W, H);
            this.cameras.main.fadeIn(800, 0, 0, 0);

            const bg = this.add.graphics();
            bg.fillStyle(0x8B7355, 1); bg.fillRect(0, 0, W, H);
            bg.lineStyle(1, 0x7B6345, 0.2);
            for (let x = 0; x < W; x += 32) for (let y = 0; y < H; y += 32) bg.strokeRect(x, y, 32, 32);

            const rug = this.add.graphics();
            rug.fillStyle(0xCC6644, 0.6); rug.fillRoundedRect(280, 380, 96, 40, 8); rug.setDepth(0);

            const obstacles = [];

            const bed = this.add.image(100, 72, 'krovat').setDisplaySize(64*S, 32*S);
            bed.setDepth(5);
            this.physics.add.existing(bed, true); bed.body.setSize(bed.displayWidth, bed.displayHeight); obstacles.push(bed);

            const fireplace = this.add.image(360, 72, 'kamin').setDisplaySize(64*S, 32*S);
            this.physics.add.existing(fireplace, true); fireplace.body.setSize(fireplace.displayWidth, fireplace.displayHeight); obstacles.push(fireplace);

            const dresser = this.add.image(40, 400, 'komod').setDisplaySize(32*S, 32*S);
            this.physics.add.existing(dresser, true); dresser.body.setSize(dresser.displayWidth, dresser.displayHeight); obstacles.push(dresser);

            const table = this.add.rectangle(500, 400, 40*S, 28*S, 0x8B6914).setStrokeStyle(2, 0x6B4914);
            this.physics.add.existing(table, true); table.body.setSize(40*S, 28*S); obstacles.push(table);
            this.add.circle(500, 392, 6*S, 0xDDDDDD).setStrokeStyle(1, 0x999999).setDepth(1);

            const plant = this.add.rectangle(580, 400, 16*S, 22*S, 0x336633).setStrokeStyle(2, 0x225522);
            this.physics.add.existing(plant, true); plant.body.setSize(16*S, 22*S); obstacles.push(plant);
            this.add.circle(580, 385, 8*S, 0x44AA44).setDepth(1);

            const shelf = this.add.rectangle(520, 24, 64*S, 8*S, 0x8B6914).setStrokeStyle(1, 0x6B4914);
            this.physics.add.existing(shelf, true); shelf.body.setSize(64*S, 8*S); obstacles.push(shelf);
            [0xCC3333, 0x3333CC, 0x33AA33, 0xCCCC33, 0xCC33CC].forEach((c, i) => this.add.rectangle(490+i*15, 18, 10*S, 6*S, c).setDepth(1));

            const cat = this.add.rectangle(320, 395, 14*S, 10*S, 0xFF8844).setStrokeStyle(2, 0xCC6622).setDepth(2);
            this.add.circle(316, 392, 2*S, 0xFFFF00).setDepth(3); this.add.circle(324, 392, 2*S, 0xFFFF00).setDepth(3);
            this.physics.add.existing(cat, true); cat.body.setSize(14*S, 10*S); obstacles.push(cat);

            const door = this.add.rectangle(620, 240, 10*S, 32*S, 0x6B4914).setStrokeStyle(2, 0x4B2904);
            this.physics.add.existing(door, true); door.body.setSize(10*S, 32*S); obstacles.push(door);
            this.add.circle(618, 240, 2*S, 0xFFD700).setDepth(1);

            this.player = this.physics.add.sprite(300, 300, 'seva');
            this.player.setScale(S); this.player.setCollideWorldBounds(true); this.player.setDepth(10);
            this.player.body.setSize(14, 24); this.player.body.setOffset(9, 4);

            this.physics.add.collider(this.player, obstacles);
            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

            this.add.text(10, 10, 'F-хитбоксы G-зоны Q-инвентарь H-коорд', {
                fontSize: '9px', fill: '#aaaaaa', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setScrollFactor(0).setDepth(100);

            this.thoughtText = this.add.text(320, 470, '', {
                fontSize: '14px', fill: '#ffffff', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3,
                wordWrap: { width: 620 }, align: 'center'
            }).setOrigin(0.5, 1).setScrollFactor(0).setAlpha(0).setDepth(20);

            this.actionButton = this.add.text(580, 340, '[E]', {
                fontSize: '16px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3,
                backgroundColor: '#333333', padding: { x: 6, y: 3 }
            }).setOrigin(0.5).setScrollFactor(0).setAlpha(0).setDepth(20);

            this.inventoryBg = this.add.rectangle(320, 420, 300, 160, 0x222222, 0.9).setStrokeStyle(2, 0x888888);
            this.inventoryBg.setScrollFactor(0).setDepth(30).setVisible(false);
            this.invTitle = this.add.text(320, 350, 'ИНВЕНТАРЬ', {
                fontSize: '14px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setOrigin(0.5).setScrollFactor(0).setDepth(31).setVisible(false);
            this.inventoryText = this.add.text(200, 380, '', {
                fontSize: '12px', fill: '#ffffff', fontFamily: 'monospace', wordWrap: { width: 240 }
            }).setScrollFactor(0).setDepth(31).setVisible(false);

            this.coordsText = this.add.text(10, 25, '', {
                fontSize: '9px', fill: '#00ff00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setScrollFactor(0).setDepth(100).setVisible(false);

            this.zoneGraphics = this.add.graphics().setDepth(6).setVisible(false);

            this.wasd.W = this.input.keyboard.addKey('W'); this.wasd.A = this.input.keyboard.addKey('A');
            this.wasd.S = this.input.keyboard.addKey('S'); this.wasd.D = this.input.keyboard.addKey('D');
            this.actionKey = this.input.keyboard.addKey('E');
            this.fKey = this.input.keyboard.addKey('F');
            this.gKey = this.input.keyboard.addKey('G');
            this.qKey = this.input.keyboard.addKey('Q');
            this.hKey = this.input.keyboard.addKey('H');

            // === ДЖОЙСТИК ДЛЯ ТЕЛЕФОНА ===
            if (!this.sys.game.device.os.desktop) {
                const joyX = 90, joyY = 390;
                const base = this.add.circle(joyX, joyY, 50, 0x333333, 0.5).setDepth(200).setScrollFactor(0);
                const thumb = this.add.circle(joyX, joyY, 25, 0x888888, 0.7).setDepth(201).setScrollFactor(0);
                
                this.joyStick = { base, thumb, forceX: 0, forceY: 0, active: false };
                
                this.input.on('pointerdown', (pointer) => {
                    const dx = pointer.x - joyX;
                    const dy = pointer.y - joyY;
                    if (Math.sqrt(dx*dx + dy*dy) < 80) {
                        this.joyStick.active = true;
                    }
                });
                
                this.input.on('pointermove', (pointer) => {
                    if (!this.joyStick || !this.joyStick.active) return;
                    const dx = pointer.x - joyX;
                    const dy = pointer.y - joyY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const maxDist = 40;
                    
                    if (dist > maxDist) {
                        this.joyStick.forceX = dx / dist;
                        this.joyStick.forceY = dy / dist;
                        thumb.x = joyX + this.joyStick.forceX * maxDist;
                        thumb.y = joyY + this.joyStick.forceY * maxDist;
                    } else if (dist > 10) {
                        this.joyStick.forceX = dx / maxDist;
                        this.joyStick.forceY = dy / maxDist;
                        thumb.x = pointer.x;
                        thumb.y = pointer.y;
                    } else {
                        this.joyStick.forceX = 0;
                        this.joyStick.forceY = 0;
                        thumb.x = joyX;
                        thumb.y = joyY;
                    }
                });
                
                this.input.on('pointerup', () => {
                    if (!this.joyStick) return;
                    this.joyStick.active = false;
                    this.joyStick.forceX = 0;
                    this.joyStick.forceY = 0;
                    thumb.x = joyX;
                    thumb.y = joyY;
                });

                // Кнопка E
                const btnX = 550, btnY = 390;
                this.actionBtn = this.add.circle(btnX, btnY, 30, 0xffdd00, 0.6).setDepth(200).setScrollFactor(0);
                const btnText = this.add.text(btnX, btnY, 'E', {
                    fontSize: '20px', fill: '#000000', fontFamily: 'monospace'
                }).setOrigin(0.5).setDepth(201).setScrollFactor(0);
                
                this.actionBtn.setInteractive({ useHandCursor: true });
                this.actionBtn.on('pointerdown', () => {
                    if (this.actionKey) this.actionKey.emit('down');
                    if (typeof doAction === 'function') doAction();
                });
                this.actionBtn.on('pointerup', () => {
                    if (this.actionKey) this.actionKey.emit('up');
                });
            }

            const scene = this;
            let thoughtTimer = null;

            function showThought(text, duration = 3000) {
                scene.thoughtText.setText('Мысли: ' + text); scene.thoughtText.setAlpha(1);
            }
            function hideThought() { scene.thoughtText.setAlpha(0); }
            function doStoryThought(text, duration = 3000) {
                if (thoughtTimer) clearTimeout(thoughtTimer);
                scene.thoughtText.setText(text); scene.thoughtText.setAlpha(1);
                thoughtTimer = setTimeout(hideThought, duration);
            }

            scene.getActionZones = function() {
                return [
                    { x: 100, y: 72,  range: 110, action: 'krovat', color: 0xff4444 },
                    { x: 360, y: 72,  range: 110, action: 'kamin',  color: 0xff8800 },
                    { x: 40,  y: 400, range: 90,  action: 'komod',  color: 0x44aaff },
                    { x: 320, y: 395, range: 55,  action: 'cat',    color: 0x44ff44 },
                    { x: 500, y: 400, range: 80,  action: 'table',  color: 0xffff44 },
                    { x: 620, y: 240, range: 55,  action: 'door',   color: 0xff44ff },
                ];
            };

            function doAction() {
                if (!scene.currentAction) return;
                if (thoughtTimer) clearTimeout(thoughtTimer); hideThought();

                switch(scene.currentAction) {
                    case 'krovat':
                        if (scene.storyStep === 0) {
                            scene.isInBed = true;
                            scene.player.setDepth(15);
                            scene.player.setAngle(-90);
                            scene.player.y = 84;
                            scene.player.body.enable = false;
                            scene.actionButton.setAlpha(0);
                            doStoryThought('Zzz...', 2000);
                            setTimeout(() => {
                                doStoryThought('Точно! Сегодня же с Кирой в гости к Черемше...', 3000);
                                setTimeout(() => {
                                    scene.isInBed = false;
                                    scene.player.setAngle(0);
                                    scene.player.setDepth(10);
                                    scene.player.y = 140;
                                    scene.player.body.enable = true;
                                    scene.storyStep = 1;
                                    doStoryThought('Надо взять летучий порох из комода...', 3000);
                                }, 3000);
                            }, 2000);
                        } else if (scene.storyStep >= 1 && scene.isInBed) {
                            scene.isInBed = false;
                            scene.player.setAngle(0);
                            scene.player.setDepth(10);
                            scene.player.y = 140;
                            scene.player.body.enable = true;
                            doStoryThought('Надо взять летучий порох из комода...', 3000);
                        } else {
                            showThought('Я уже выспалась...'); thoughtTimer = setTimeout(hideThought, 2000);
                        }
                        break;
                    case 'kamin':
                        if (scene.hasFluePowder) {
                            doStoryThought('Пора к Римусу! ✨', 1500);
                            scene.time.delayedCall(1500, () => {
                                scene.cameras.main.fadeOut(800, 0, 0, 0);
                                scene.time.delayedCall(800, () => scene.scene.start('LupinScene'));
                            });
                        } else { showThought('Нужен летучий порох...'); thoughtTimer = setTimeout(hideThought, 2000); }
                        break;
                    case 'komod':
                        if (!scene.hasFluePowder && scene.storyStep >= 1) {
                            scene.hasFluePowder = true; scene.inventory.push('Летучий порох'); scene.storyStep = 2;
                            doStoryThought('В комоде летучий порох! Теперь к камину!', 2500);
                        } else if (scene.hasFluePowder) { showThought('Я уже взяла порох.'); thoughtTimer = setTimeout(hideThought, 2000); }
                        else { showThought('Пока не время...'); thoughtTimer = setTimeout(hideThought, 2000); }
                        break;
                    case 'cat': showThought('Мяу! Грей, ты мой хороший...'); thoughtTimer = setTimeout(hideThought, 2500); break;
                    case 'table': showThought('Кружка с чаем. Ещё тёплая.'); thoughtTimer = setTimeout(hideThought, 2000); break;
                    case 'door': showThought('Заперто. Да и не хочется на улицу.'); thoughtTimer = setTimeout(hideThought, 2500); break;
                }
            }

            this.actionKey.on('down', doAction);

            this.checkZones = function() {
                if (scene.isInBed) {
                    if (scene.storyStep >= 1) {
                        scene.currentAction = 'krovat'; scene.actionButton.setAlpha(1); scene.actionButton.setText('[E] Встать');
                    } else { scene.currentAction = null; scene.actionButton.setAlpha(0); }
                    return;
                }
                const zones = scene.getActionZones();
                let found = null;
                for (const z of zones) {
                    if (Phaser.Math.Distance.Between(scene.player.x, scene.player.y, z.x, z.y) < z.range) { found = z; break; }
                }
                if (found) {
                    scene.currentAction = found.action; scene.actionButton.setAlpha(1);
                    switch(found.action) {
                        case 'krovat': scene.actionButton.setText(scene.storyStep===0?'[E] Лечь':'[E] Кровать'); break;
                        case 'kamin': scene.actionButton.setText('[E] Камин'); break;
                        case 'komod': scene.actionButton.setText('[E] Комод'); break;
                        case 'cat': scene.actionButton.setText('[E] Погладить'); break;
                        case 'table': scene.actionButton.setText('[E] Стол'); break;
                        case 'door': scene.actionButton.setText('[E] Дверь'); break;
                    }
                } else { scene.currentAction = null; scene.actionButton.setAlpha(0); }
            };

            this.updateInventoryUI = function() {
                const vis = scene.showInventory;
                scene.inventoryBg.setVisible(vis); scene.invTitle.setVisible(vis); scene.inventoryText.setVisible(vis);
                if (vis) scene.inventoryText.setText(scene.inventory.length === 0 ? '  (пусто)' : scene.inventory.map(i => '  • ' + i).join('\n'));
            };

            this.updateZoneGraphics = function() {
                scene.zoneGraphics.clear();
                if (!scene.showZones) return;
                for (const z of scene.getActionZones()) {
                    scene.zoneGraphics.fillStyle(z.color, 0.15);
                    scene.zoneGraphics.fillCircle(z.x, z.y, z.range);
                    scene.zoneGraphics.lineStyle(2, z.color, 0.6);
                    scene.zoneGraphics.strokeCircle(z.x, z.y, z.range);
                }
            };

            this.time.delayedCall(100, () => { this.speedReady = true; });
            this.time.delayedCall(500, () => doStoryThought('Доброе утро... 14 лет? Не, я лучше дальше спать...', 3000));
            console.log('✅ Сцена 1 (с джойстиком)');
        }

        update() {
            if (this.hKey && this.hKey.isDown && !this.hWasDown) {
                this.showCoords = !this.showCoords;
                if (this.coordsText) this.coordsText.setVisible(this.showCoords);
            }
            this.hWasDown = this.hKey ? this.hKey.isDown : false;
            if (this.showCoords && this.player && this.coordsText) {
                this.coordsText.setText('X: ' + Math.floor(this.player.x) + ' | Y: ' + Math.floor(this.player.y));
            }

            if (this.checkZones) this.checkZones();
            if (this.updateInventoryUI) this.updateInventoryUI();
            if (this.updateZoneGraphics) this.updateZoneGraphics();

            if (this.fKey && this.fKey.isDown && !this.fWasDown) {
                this.showDebug = !this.showDebug;
                if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = this.showDebug;
                this.physics.world.drawDebug = this.showDebug;
            }
            this.fWasDown = this.fKey ? this.fKey.isDown : false;

            if (this.gKey && this.gKey.isDown && !this.gWasDown) {
                this.showZones = !this.showZones;

            }
            this.qWasDown = this.qKey ? this.qKey.isDown : false;

            // Движение
            if (this.speedReady && !this.isInBed) {
                const speed = 250;
                
                if (!this.sys.game.device.os.desktop && this.joyStick) {
                    // Телефон — джойстик
                    if (this.joyStick.forceX !== 0 || this.joyStick.forceY !== 0) {
                        this.player.setVelocity(
                            this.joyStick.forceX * speed,
                            this.joyStick.forceY * speed
                        );
                    } else {

                    }
                } else if (this.sys.game.device.os.desktop && this.wasd) {

                        this.player.setVelocity(vx * speed / Math.sqrt(vx*vx+vy*vy), vy * speed / Math.sqrt(vx*vx+vy*vy));
                    }
                }
            }
        }
    }

            this.showZones = false; this.gKey = null; this.gWasDown = false;

            this.hKey = null; this.hWasDown = false; this.showCoords = false; this.coordsText = null;
            this.inventory = []; this.inventoryText = null; this.inventoryBg = null;
            this.invTitle = null; this.showInventory = false;
            this.zoneGraphics = null;
            this.speedReady = false;
            this.dialogueActive = false;
            this.detected = false;
            this.obstacles = [];
            this.kiraPath = [];
            this.kiraEyeL = null;
            this.kiraEyeR = null;
            this.kiraMouth = null;

            this.cameras.main.setBounds(0, 0, worldW, worldH);

            this.cameras.main.fadeIn(800, 0, 0, 0);

            const bg = this.add.graphics();
            bg.fillStyle(0x666666, 1); bg.fillRect(0, 0, worldW, worldH);
            bg.lineStyle(1, 0x555555, 0.3);
            for (let x = 0; x < worldW; x += 32) for (let y = 0; y < worldH; y += 32) bg.strokeRect(x, y, 32, 32);

            const scene = this;

            function addWall(x, y, w, h) {
                const wall = this.add.rectangle(x + w/2, y + h/2, w, h, 0x888888);
                wall.setStrokeStyle(2, 0x666666);
                this.physics.add.existing(wall, true);
                wall.body.setSize(w, h);
                scene.obstacles.push(wall);
            }

            // Внешние стены
            addWall.call(this, 0, 0, worldW, 8);
            addWall.call(this, 0, worldH-8, worldW, 8);
            addWall.call(this, 0, 0, 8, worldH);
            addWall.call(this, worldW-8, 0, 8, worldH);

            // Лабиринт (твои правки)
            addWall.call(this, 200, 60, 8, 160);
            addWall.call(this, 200, 340, 200, 8);
            addWall.call(this, 400, 120, 8, 220);
            addWall.call(this, 400, 120, 240, 8);
            addWall.call(this, 640, 380, 200, 8);
            addWall.call(this, 840, 120, 8, 320);
            addWall.call(this, 640, 120, 120, 8);
            addWall.call(this, 960, 60, 8, 120);
            addWall.call(this, 960, 260, 8, 160);

            // === КАМЕРЫ ===
            const cameras = [];
            
            function createCamera(x, y, patrolMin, patrolMax, isHorizontal, speed, coneW, coneH) {
                const cam = scene.add.rectangle(x, y, 14, 14, 0xff0000);
                cam.setStrokeStyle(2, 0xcc0000); cam.setDepth(5);
                const cone = scene.add.graphics().setDepth(4);
                const camData = { obj: cam, cone: cone, min: patrolMin, max: patrolMax, horizontal: isHorizontal, speed: speed, coneW: coneW, coneH: coneH, dir: 1 };
                cameras.push(camData);
                return camData;
            }

                scene.dialogueActive = true;
                scene.actionButton.setAlpha(0);
                if (thoughtTimer) clearTimeout(thoughtTimer);
                scene.thoughtText.setText(text); scene.thoughtText.setAlpha(1);
                thoughtTimer = setTimeout(hideThought, duration);
            }

            function isCharInCone(charX, charY, charW, charH, cam) {
                const points = [
                    { x: charX, y: charY },
                    { x: charX - charW/2, y: charY - charH/2 },
                    { x: charX + charW/2, y: charY - charH/2 },
                    { x: charX - charW/2, y: charY + charH/2 },
                    { x: charX + charW/2, y: charY + charH/2 },
                ];
                for (const p of points) {
                    const dx = p.x - cam.obj.x;
                    const dy = p.y - cam.obj.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const maxDist = Math.max(cam.coneW, cam.coneH);
                    if (dist < maxDist) {
                        if (cam.horizontal) {
                            const dir = cam.dir;
                            if (dx * dir > 0 && dx * dir < cam.coneW && Math.abs(dy) < cam.coneH/2) return true;
                        } else {
                            const dir = cam.dir;
                            if (dy * dir > 0 && dy * dir < cam.coneH && Math.abs(dx) < cam.coneW/2) return true;
                        }
                    }
                }
                return false;
            }

            scene.getActionZones = function() {
                return [{ x: 1100, y: 200, range: 90, action: 'rocket', color: 0xFFD700 }];
            };

            function doAction() {
                if (scene.dialogueActive || scene.detected) return;
                if (!scene.currentAction) return;
                if (thoughtTimer) clearTimeout(thoughtTimer); hideThought();
                if (scene.currentAction === 'rocket') {
                    doStoryThought('Ракета! Быстрее на борт! 🚀', 2000);
                    scene.time.delayedCall(2000, () => {
                        scene.cameras.main.fadeOut(800, 0, 0, 0);
                        scene.time.delayedCall(800, () => scene.scene.start('SpaceScene'));
                    });
                }
            }

            this.actionKey.on('down', doAction);

            this.checkZones = function() {
                if (scene.dialogueActive || scene.detected) { scene.actionButton.setAlpha(0); return; }
                const zones = scene.getActionZones();
                let found = null;
                for (const z of zones) {
                    if (Phaser.Math.Distance.Between(scene.player.x, scene.player.y, z.x, z.y) < z.range) { found = z; break; }
                }
                if (found) {
                    scene.currentAction = found.action; scene.actionButton.setAlpha(1);
                    scene.actionButton.setText('[E] Запустить');
                } else { scene.currentAction = null; scene.actionButton.setAlpha(0); }
            };

            this.checkDetection = function() {
                if (scene.detected) return;
                for (const cam of cameras) {
                    const sevaW = 42, sevaH = 72;
                    const kiraW = 60, kiraH = 72;
                    const sevaDetected = isCharInCone(scene.player.x, scene.player.y, sevaW, sevaH, cam);
                    const kiraDetected = isCharInCone(scene.kira.x, scene.kira.y, kiraW, kiraH, cam);
                    if (sevaDetected || kiraDetected) {
                        scene.detected = true;
                        const who = sevaDetected ? 'Сева' : 'Кира';
                        doStoryThought('🚨 ' + who + ' заметили! Прячемся обратно...', 2000);
                        scene.time.delayedCall(2000, () => {
                            scene.detected = false;
                            scene.player.setPosition(50, 240);
                            scene.kira.setPosition(30, 240);
                            scene.kira.body.setVelocity(0, 0);
                            scene.kiraGfx.setPosition(30, 240);
                            scene.kiraEyeL.setPosition(24, 232);
                            scene.kiraEyeR.setPosition(36, 232);
                            scene.kiraMouth.setPosition(30, 244);
                            scene.kiraPath = [];
                            for (let i = 0; i < 25; i++) scene.kiraPath.push({ x: 50, y: 240 });
                            hideThought();
                        });
                        break;
                    }
                }
            };

            this.updateCameras = function() {
                for (const cam of cameras) {
                    if (cam.horizontal) {
                        cam.obj.x += cam.speed * cam.dir;
                        if (cam.obj.x >= cam.max) cam.dir = -1;
                        if (cam.obj.x <= cam.min) cam.dir = 1;
                        cam.cone.clear();
                        cam.cone.fillStyle(0xffff00, 0.25);
                        const cx = cam.obj.x, cy = cam.obj.y, dir = cam.dir;
                        cam.cone.fillTriangle(cx, cy, cx+dir*cam.coneW, cy-cam.coneH/2, cx+dir*cam.coneW, cy+cam.coneH/2);
                    } else {
                        cam.obj.y += cam.speed * cam.dir;
                        if (cam.obj.y >= cam.max) cam.dir = -1;
                        if (cam.obj.y <= cam.min) cam.dir = 1;
                        cam.cone.clear();
                        cam.cone.fillStyle(0xffff00, 0.25);
                        const cx = cam.obj.x, cy = cam.obj.y, dir = cam.dir;
                        cam.cone.fillTriangle(cx, cy, cx-cam.coneW/2, cy+dir*cam.coneH, cx+cam.coneW/2, cy+dir*cam.coneH);
                    }
                }
            };

            this.updateKira = function() {
                scene.kiraPath.push({ x: scene.player.x, y: scene.player.y });
                if (scene.kiraPath.length > 25) scene.kiraPath.shift();
                const target = scene.kiraPath[0];
                const dx = target.x - scene.kira.x;
                const dy = target.y - scene.kira.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 2) {
                    const speed = 120;
                    scene.kira.body.setVelocity((dx / dist) * speed, (dy / dist) * speed);
                } else {
                    scene.kira.body.setVelocity(0, 0);
                }
                // Визуал за физикой
                scene.kiraGfx.setPosition(scene.kira.x, scene.kira.y);
                scene.kiraEyeL.setPosition(scene.kira.x - 6, scene.kira.y - 8);
                scene.kiraEyeR.setPosition(scene.kira.x + 6, scene.kira.y - 8);
                scene.kiraMouth.setPosition(scene.kira.x, scene.kira.y + 4);
            };

            this.updateInventoryUI = function() {
                const vis = scene.showInventory;
                scene.inventoryBg.setVisible(vis); scene.invTitle.setVisible(vis); scene.inventoryText.setVisible(vis);
                if (vis) scene.inventoryText.setText(scene.inventory.length === 0 ? '  (пусто)' : scene.inventory.map(i => '  • ' + i).join('\n'));
            };

            this.updateZoneGraphics = function() {
                scene.zoneGraphics.clear();
                if (!scene.showZones) return;
                for (const z of scene.getActionZones()) {
                    scene.zoneGraphics.fillStyle(z.color, 0.15);
                    scene.zoneGraphics.fillCircle(z.x, z.y, z.range);
                    scene.zoneGraphics.lineStyle(2, z.color, 0.6);
                    scene.zoneGraphics.strokeCircle(z.x, z.y, z.range);
                }
            };

            const prevScene = this.scene.get('LupinScene');
            if (prevScene && prevScene.inventory) this.inventory = [...prevScene.inventory];

            this.time.delayedCall(100, () => { this.speedReady = true; });
            this.time.delayedCall(500, () => showThought('Кира, за мной! Только тихо...', 3000));
            console.log('✅ Сцена 3: Кира с физикой, стены правленые.');
        }

        update() {
            if (this.hKey.isDown && !this.hWasDown) {
                this.showCoords = !this.showCoords;
                this.coordsText.setVisible(this.showCoords);
            }
            this.hWasDown = this.hKey.isDown;
            if (this.showCoords && this.player) {
                this.coordsText.setText('X: ' + Math.floor(this.player.x) + ' | Y: ' + Math.floor(this.player.y));
            }

            if (this.checkZones) this.checkZones();
            if (this.checkDetection) this.checkDetection();
            if (this.updateCameras) this.updateCameras();
            if (this.updateKira) this.updateKira();
            if (this.updateInventoryUI) this.updateInventoryUI();
            if (this.updateZoneGraphics) this.updateZoneGraphics();

            if (this.fKey.isDown && !this.fWasDown) {
                this.showDebug = !this.showDebug;
                if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = this.showDebug;
                this.physics.world.drawDebug = this.showDebug;
            }
            this.fWasDown = this.fKey.isDown;

            if (this.gKey.isDown && !this.gWasDown) {
                this.showZones = !this.showZones;
                this.zoneGraphics.setVisible(this.showZones);
            }
            this.gWasDown = this.gKey.isDown;

            if (this.qKey.isDown && !this.qWasDown) {
                this.showInventory = !this.showInventory;
            }
            this.qWasDown = this.qKey.isDown;

            if (this.sys.game.device.os.desktop && this.speedReady && !this.detected) {
                const speed = 250;
                this.player.setVelocity(0);
                if (this.wasd.A.isDown) this.player.setVelocityX(-speed);
                if (this.wasd.D.isDown) this.player.setVelocityX(speed);
                if (this.wasd.W.isDown) this.player.setVelocityY(-speed);
                if (this.wasd.S.isDown) this.player.setVelocityY(speed);
                const vx = this.player.body.velocity.x, vy = this.player.body.velocity.y;
                if (vx !== 0 && vy !== 0) {
                    this.player.setVelocity(vx * speed / Math.sqrt(vx*vx+vy*vy), vy * speed / Math.sqrt(vx*vx+vy*vy));
                }
            }
        }
    }

            this.inventoryBg = this.add.rectangle(320, 420, 300, 160, 0x222222, 0.9).setStrokeStyle(2, 0x888888);
            this.inventoryBg.setScrollFactor(0).setDepth(30).setVisible(false);

                fontSize: '14px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setOrigin(0.5).setScrollFactor(0).setDepth(31).setVisible(false);
            this.inventoryText = this.add.text(200, 380, '', {
                fontSize: '12px', fill: '#ffffff', fontFamily: 'monospace', wordWrap: { width: 240 }
            }).setScrollFactor(0).setDepth(31).setVisible(false);

            const progressBg = this.add.rectangle(320, 20, 300, 10, 0x333333);
            progressBg.setStrokeStyle(1, 0x666666);
            progressBg.setScrollFactor(0).setDepth(100);
            
            const progressFill = this.add.rectangle(170, 20, 0, 8, 0x44aaff);
            progressFill.setOrigin(0, 0.5).setScrollFactor(0).setDepth(101);
            
            const progressLabel = this.add.text(320, 20, '🌍 Земля → Солнце ☀️', {
                fontSize: '8px', fill: '#aaaaaa', fontFamily: 'monospace'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(101);
            
            // Эффект достижения цели (вспышка по всему экрану)
            const flashOverlay = this.add.rectangle(320, 240, 640, 480, 0xffffff, 0);
            flashOverlay.setScrollFactor(0).setDepth(50);
            
            this.updateProgress = function() {
                const progress = Phaser.Math.Clamp((this.player.x - 120) / (2940 - 120), 0, 1);
                progressFill.width = 300 * progress;
                
                if (progress >= 0.95 && !this.reachedSun && !this.returningToEarth) {
                    this.reachedSun = true;
                    
                    // Вспышка!
                    flashOverlay.setAlpha(1);
                    this.tweens.add({
                        targets: flashOverlay,
                        alpha: 0,
                        duration: 1000,
                        ease: 'Cubic.easeOut'
                    });
                    
                    // Эффект у Солнца
                    sunReachEffect.setVisible(true);
                    sunReachEffect.clear();
                    sunReachEffect.fillStyle(0xffffff, 0.8);
                    sunReachEffect.fillCircle(2940, 240, 200);
                    this.tweens.add({
                        targets: sunReachEffect,
                        alpha: 0,
                        duration: 1500,
                        ease: 'Cubic.easeOut',
                        onComplete: () => sunReachEffect.setVisible(false)
                    });
                    
                    doStoryThought('☀️ Достигли Солнца! Теперь обратно к Земле!', 3000);
                    this.time.delayedCall(3000, () => {
                        this.returningToEarth = true;
                        progressLabel.setText('☀️ Солнце → Земля 🌍');
                    });
                }
                
                if (this.returningToEarth && progress <= 0.05 && this.reachedSun) {
                    this.reachedSun = false;
                    
                    // Вспышка при возвращении
                    flashOverlay.setAlpha(0.8);
                    this.tweens.add({
                        targets: flashOverlay,
                        alpha: 0,
                        duration: 800,
                        ease: 'Cubic.easeOut'
                    });
                    
                    doStoryThought('🌍 Вернулись на Землю! ✨', 2000);
                    this.time.delayedCall(2000, () => {
                        this.cameras.main.fadeOut(800, 0, 0, 0);
                        this.time.delayedCall(800, () => {
                            this.scene.start('DiveScene'); // потом заменить на 'DiveScene'
                        });
                    });
                }
            };

            this.coordsText = this.add.text(10, 25, '', {
                fontSize: '9px', fill: '#00ff00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setScrollFactor(0).setDepth(100).setVisible(false);

            this.zoneGraphics = this.add.graphics().setDepth(6).setVisible(false);

            this.wasd.W = this.input.keyboard.addKey('W'); this.wasd.A = this.input.keyboard.addKey('A');
            this.wasd.S = this.input.keyboard.addKey('S'); this.wasd.D = this.input.keyboard.addKey('D');
            this.actionKey = this.input.keyboard.addKey('E');
            this.fKey = this.input.keyboard.addKey('F');
            this.gKey = this.input.keyboard.addKey('G');
            this.qKey = this.input.keyboard.addKey('Q');
            this.hKey = this.input.keyboard.addKey('H');

            this.checkZones = function() {};
            this.updateInventoryUI = function() {
                const vis = scene.showInventory;
                scene.inventoryBg.setVisible(vis); scene.invTitle.setVisible(vis); scene.inventoryText.setVisible(vis);
                if (vis) scene.inventoryText.setText(scene.inventory.length === 0 ? '  (пусто)' : scene.inventory.map(i => '  • ' + i).join('\n'));
            };
            this.updateZoneGraphics = function() {};

            const prevScene = this.scene.get('BaseScene');
            if (prevScene && prevScene.inventory) this.inventory = [...prevScene.inventory];

            this.time.delayedCall(100, () => { this.speedReady = true; });
            this.time.delayedCall(500, () => showThought('Летим к Солнцу! Управляй ракетой (WASD).', 3000));
            console.log('✅ Сцена 5: Космос.');
        }

        update() {
            if (this.updateFire) this.updateFire();
            if (this.updateProgress) this.updateProgress();

            if (this.hKey.isDown && !this.hWasDown) {
                this.showCoords = !this.showCoords;
                this.coordsText.setVisible(this.showCoords);
            }
            this.hWasDown = this.hKey.isDown;
            if (this.showCoords && this.player) {
                this.coordsText.setText('X: ' + Math.floor(this.player.x) + ' | Y: ' + Math.floor(this.player.y));
            }

            if (this.updateInventoryUI) this.updateInventoryUI();
            if (this.updateZoneGraphics) this.updateZoneGraphics();

            if (this.fKey.isDown && !this.fWasDown) {
                this.showDebug = !this.showDebug;
                if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = this.showDebug;
                this.physics.world.drawDebug = this.showDebug;
            }
            this.fWasDown = this.fKey.isDown;

            if (this.gKey.isDown && !this.gWasDown) {
                this.showZones = !this.showZones;
                this.zoneGraphics.setVisible(this.showZones);
            }
            this.gWasDown = this.gKey.isDown;

            if (this.qKey.isDown && !this.qWasDown) {
                this.showInventory = !this.showInventory;
            }
            this.qWasDown = this.qKey.isDown;

            if (this.sys.game.device.os.desktop && this.speedReady) {
                const speed = 1500;
                const drag = 0.92;
                
                let ax = 0, ay = 0;
                if (this.wasd.A.isDown) ax = -speed;
                if (this.wasd.D.isDown) ax = speed;
                if (this.wasd.W.isDown) ay = -speed;
                if (this.wasd.S.isDown) ay = speed;

                const vx = this.player.body.velocity.x + ax * (1/60);
                const vy = this.player.body.velocity.y + ay * (1/60);
                
                this.player.setVelocity(vx * drag, vy * drag);
                
                const maxSpeed = 4000;
                const currentSpeed = Math.sqrt(vx*vx + vy*vy);
                if (currentSpeed > maxSpeed) {
                    this.player.setVelocity(vx * maxSpeed / currentSpeed, vy * maxSpeed / currentSpeed);
                }

                if (Math.abs(vx) < 1 && Math.abs(vy) < 1 && ax === 0 && ay === 0) {
                    this.player.setVelocity(0, 0);
                }
            }
        }
    }

    // ==================== СЦЕНА 6: НЫРЯНИЕ (кат-сцена) ====================
    class DiveScene extends Phaser.Scene {
        constructor() { super('DiveScene'); }

        create() {
            const W = 640, H = 480;
            const skyHeight = 500;
            const oceanDepth = 800;
            const worldH = skyHeight + oceanDepth;
            
            this.cameras.main.setBackgroundColor('#000000');
            this.cameras.main.fadeIn(1000, 0, 0, 0);
            this.cameras.main.setBounds(0, 0, W, worldH);

            const scene = this;

            // === НЕБО ===
            const sky = this.add.graphics();
            const skyBands = [
                { y: 0, h: 100, color: 0x0a0a2e },
                { y: 100, h: 100, color: 0x1a1a4e },
                { y: 200, h: 100, color: 0x334488 },
                { y: 300, h: 100, color: 0x5577bb },
                { y: 400, h: 100, color: 0x88aadd },
            ];
            skyBands.forEach(band => {
                sky.fillStyle(band.color, 1);
                sky.fillRect(0, band.y, W, band.h + 1);
            });

            for (let i = 0; i < 40; i++) {
                const x = Phaser.Math.Between(0, W);
                const y = Phaser.Math.Between(0, 250);
                const alpha = y < 150 ? Phaser.Math.Between(5, 10)/10 : Phaser.Math.Between(1, 4)/10;
                this.add.circle(x, y, Phaser.Math.Between(1, 2), 0xffffff, alpha);
            }

            const clouds = this.add.graphics();
            clouds.fillStyle(0xffffff, 0.5);
            [
                [100, 350, 140], [160, 340, 90], [60, 355, 70],
                [380, 370, 120], [440, 360, 80], [330, 375, 70],
                [520, 340, 100], [580, 350, 80], [550, 360, 60]
            ].forEach(([cx, cy, rw]) => {
                clouds.fillEllipse(cx, cy, rw, 35);
            });

            // === ОКЕАН ===
            const ocean = this.add.graphics();
            ocean.setDepth(3);
            const oceanBands = [
                { y: skyHeight, h: 150, color: 0x115566 },
                { y: skyHeight + 150, h: 200, color: 0x0a3344 },
                { y: skyHeight + 350, h: 200, color: 0x051a22 },
                { y: skyHeight + 550, h: 250, color: 0x020a11 },
            ];
            oceanBands.forEach(band => {
                ocean.fillStyle(band.color, 1);
                ocean.fillRect(0, band.y, W, band.h + 1);
            });

            // Поверхность воды
            const waterSurface = this.add.graphics().setDepth(4);
            waterSurface.fillStyle(0x44bbcc, 0.6);
            waterSurface.fillRect(0, skyHeight, W, 3);
            waterSurface.fillStyle(0x66ddff, 0.3);
            waterSurface.fillRect(0, skyHeight + 3, W, 2);
            waterSurface.fillStyle(0x88eeff, 0.15);
            waterSurface.fillRect(0, skyHeight + 5, W, 2);

            for (let i = 0; i < 8; i++) {
                const bx = Phaser.Math.Between(20, W - 20);
                this.add.rectangle(bx, skyHeight, Phaser.Math.Between(20, 50), 2, 0xffffff, 0.2).setDepth(5);
            }

            // === РАКЕТА ===
            const body = this.add.rectangle(W/2, 80, 40, 24, 0xCCCCCC);
            body.setStrokeStyle(2, 0xFFD700); body.setDepth(10);
            const nose = this.add.triangle(W/2, 55, 0, 10, 10, 0, 20, 10, 0xFF4444).setDepth(11);
            const fire = this.add.triangle(W/2, 75, 5, 0, 15, 8, 25, 0, 0xFF8800).setDepth(9);
            
            this.tweens.add({
                targets: fire,
                scaleY: 1.4,
                duration: 150,
                yoyo: true,
                repeat: -1
            });

            // === ТЕКСТ ===
            const titleText = this.add.text(W/2, 180, '', {
                fontSize: '18px', fill: '#ffffff', fontFamily: 'monospace',
                stroke: '#000000', strokeThickness: 3, align: 'center'
            }).setOrigin(0.5).setDepth(20).setAlpha(0).setScrollFactor(0);

            // === ТЁМНЫЙ ОВЕРЛЕЙ ===
            const darkOverlay = this.add.rectangle(W/2, skyHeight + 100, W, oceanDepth, 0x001122, 0);
            darkOverlay.setDepth(15);

            // === ПУЗЫРИ ===
            const bubbles = [];
            for (let i = 0; i < 30; i++) {
                const b = this.add.circle(0, 0, Phaser.Math.Between(2, 5), 0xaaddff, 0.7).setDepth(6).setVisible(false);
                bubbles.push({ obj: b, speed: Phaser.Math.Between(30, 80) });
            }

            // === КАМЕРА ===
            this.cameras.main.startFollow(body, true, 0.1, 0.1);
            this.cameras.main.setFollowOffset(0, -80);

            // === АНИМАЦИЯ ===
            const timeline = this.time;

            timeline.delayedCall(500, () => {
                titleText.setText('Входим в атмосферу...');
                scene.tweens.add({ targets: titleText, alpha: 1, duration: 500 });
            });

            timeline.delayedCall(2000, () => {
                titleText.setText('Возвращаемся на Землю!');
                scene.tweens.add({
                    targets: [body, nose, fire],
                    y: 350,
                    angle: 10,
                    duration: 2000,
                    ease: 'Quad.easeIn'
                });
            });

            timeline.delayedCall(4000, () => {
                titleText.setText('Заходим на посадку!');
                scene.tweens.add({
                    targets: [body, nose, fire],
                    y: skyHeight - 20,
                    angle: 0,
                    duration: 1500,
                    ease: 'Quad.easeOut'
                });
            });

            timeline.delayedCall(5500, () => {
                titleText.setText('Погружаемся...');
                
                scene.tweens.add({
                    targets: [body, nose, fire],
                    y: skyHeight + 400,
                    duration: 3500,
                    ease: 'Quad.easeIn'
                });

                const spawnBubbles = (count, startY) => {
                    for (let i = 0; i < count; i++) {
                        scene.time.delayedCall(i * 60, () => {
                            const b = bubbles.find(b => !b.obj.visible);
                            if (!b) return;
                            b.obj.setVisible(true);
                            b.obj.y = startY + Phaser.Math.Between(0, 60);
                            b.obj.x = body.x + Phaser.Math.Between(-40, 40);
                            b.obj.alpha = 0.7;
                            scene.tweens.add({
                                targets: b.obj,
                                y: b.obj.y - Phaser.Math.Between(60, 180),
                                x: b.obj.x + Phaser.Math.Between(-40, 40),
                                alpha: 0,
                                duration: b.speed * 40,
                                ease: 'Quad.easeOut',
                                onComplete: () => b.obj.setVisible(false)
                            });
                        });
                    }
                };

                spawnBubbles(10, skyHeight + 50);
                scene.time.delayedCall(800, () => spawnBubbles(10, skyHeight + 180));
                scene.time.delayedCall(1600, () => spawnBubbles(8, skyHeight + 300));

                scene.tweens.add({
                    targets: darkOverlay,
                    alpha: 0.9,
                    duration: 3000,
                    ease: 'Quad.easeIn'
                });
            });

            timeline.delayedCall(9500, () => {
                scene.cameras.main.fadeOut(1000, 0, 0, 0);
                scene.time.delayedCall(1000, () => {
                    scene.scene.start('TitanicScene');
                });
            });

            // === ПРОПУСТИТЬ ===
            const skipText = this.add.text(W/2, H - 30, 'ПРОБЕЛ — пропустить', {
                fontSize: '10px', fill: '#888888', fontFamily: 'monospace'
            }).setOrigin(0.5).setDepth(20).setScrollFactor(0);

            this.input.keyboard.addKey('SPACE').on('down', () => {
                this.cameras.main.fadeOut(500, 0, 0, 0);
                this.time.delayedCall(500, () => {
                    this.scene.start('TitanicScene');
                });
            });

            console.log('✅ Сцена 6: Ныряние.');
        }
    }

            }).setOrigin(0.5).setScrollFactor(0).setDepth(31).setVisible(false);
            this.inventoryText = this.add.text(200, 380, '', {
                fontSize: '12px', fill: '#ffffff', fontFamily: 'monospace', wordWrap: { width: 240 }
            }).setScrollFactor(0).setDepth(31).setVisible(false);

            // Глубиномер
            const depthBg = this.add.rectangle(630, 240, 8, 400, 0x333333, 0.7);
            depthBg.setStrokeStyle(1, 0x666666);
            depthBg.setScrollFactor(0).setDepth(100);
            this.depthMarker = this.add.rectangle(630, 44, 12, 4, 0xff4444);
            this.depthMarker.setScrollFactor(0).setDepth(101);
            this.depthLabel = this.add.text(620, 450, '', {
                fontSize: '8px', fill: '#ffffff', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setOrigin(1, 0.5).setScrollFactor(0).setDepth(101);
            this.add.text(620, 42, '0m', {
                fontSize: '7px', fill: '#aaaaaa', fontFamily: 'monospace'
            }).setOrigin(1, 0.5).setScrollFactor(0).setDepth(101);
            this.add.text(620, 438, '900m', {
                fontSize: '7px', fill: '#aaaaaa', fontFamily: 'monospace'
            }).setOrigin(1, 0.5).setScrollFactor(0).setDepth(101);
            
            this.updateDepthGauge = function() {
                if (!this.player) return;
                const depth = Phaser.Math.Clamp(this.player.y / seafloorY, 0, 1);
                this.depthMarker.y = 44 + depth * 396;
                this.depthLabel.setText(Math.floor(this.player.y) + 'm');
            };

            this.coordsText = this.add.text(10, 25, '', {
                fontSize: '9px', fill: '#00ff00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setScrollFactor(0).setDepth(100).setVisible(false);

            // === ЛОГИКА ТРОСА И ТИТАНИКА (быстрый подъём) ===
            this.updateLifting = function() {
                if (!this.lifting || !this.ropeAttached) return;
                
                const ropeLength = 140;
                const playerX = this.player.x;
                const playerY = this.player.y;
                const titanicX = W/2;
                const titanicTopY = this.titanicY - 30;
                
                const dx = playerX - titanicX;
                const dy = playerY - titanicTopY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // Ограничение окружностью
                if (dist > ropeLength) {
                    const angle = Math.atan2(dy, dx);
                    this.player.x = titanicX + Math.cos(angle) * ropeLength;
                    this.player.y = titanicTopY + Math.sin(angle) * ropeLength;
                    const vx = this.player.body.velocity.x;
                    const vy = this.player.body.velocity.y;
                    const velAngle = Math.atan2(vy, vx);
                    const velOut = Math.cos(velAngle - angle) * Math.sqrt(vx*vx + vy*vy);
                    if (velOut > 0) {
                        this.player.body.velocity.x -= Math.cos(angle) * velOut * 0.5;
                        this.player.body.velocity.y -= Math.sin(angle) * velOut * 0.5;
                    }
                }
                
                // Титаник следует за Севой с небольшой задержкой
                const targetTitanicY = playerY + 60; // Титаник на 60px ниже Севы
                this.titanicY += (targetTitanicY - this.titanicY) * 0.08; // быстрое следование
                
                this.titanicY = Phaser.Math.Clamp(this.titanicY, 80, seafloorY);
                
                this.titanicBody.y = this.titanicY - 20;
                this.drawTitanic(this.titanicY);
                
                // Трос
                this.ropeGraphics.clear();
                this.ropeGraphics.lineStyle(2, 0x888888, 0.8);
                this.ropeGraphics.lineBetween(playerX, playerY + 15, titanicX, titanicTopY);
                
                // Победа: Сева у поверхности И Титаник почти на поверхности
                if (playerY < 60 && this.titanicY < 150 && !this.titanicLifted) {
                    this.titanicLifted = true;
                    // НЕ отцепляем трос! Просто сообщение и переход
                    showThought('🎉 Титаник на поверхности!', 3000);
                    this.time.delayedCall(3000, () => {
                        this.cameras.main.fadeOut(800, 0, 0, 0);
                        this.time.delayedCall(800, () => {
                            this.scene.start('ShoreScene');
                        });
                    });
                }
            };

            this.checkZones = function() {};
            this.updateInventoryUI = function() {
                const vis = scene.showInventory;
                scene.inventoryBg.setVisible(vis); scene.invTitle.setVisible(vis); scene.inventoryText.setVisible(vis);
                if (vis) scene.inventoryText.setText(scene.inventory.length === 0 ? '  (пусто)' : scene.inventory.map(i => '  • ' + i).join('\n'));
            };
            this.updateZoneGraphics = function() {};

            const prevScene = this.scene.get('ShoreScene');
            if (prevScene && prevScene.inventory) this.inventory = [...prevScene.inventory];

            this.time.delayedCall(100, () => { this.speedReady = true; });
            this.time.delayedCall(500, () => showThought('Найди Титаник и прикрепи трос! 🚀', 3000));
            console.log('✅ Сцена 7: Титаник следует быстро, трос не отцепляется.');
        }

        update() {
            if (this.updateFire) this.updateFire();
            if (this.updateLifting) this.updateLifting();
            if (this.updateDepthGauge) this.updateDepthGauge();

            if (this.hKey && this.hKey.isDown && !this.hWasDown) {
                this.showCoords = !this.showCoords;
                if (this.coordsText) this.coordsText.setVisible(this.showCoords);
            }
            this.hWasDown = this.hKey ? this.hKey.isDown : false;
            if (this.showCoords && this.player && this.coordsText) {
                this.coordsText.setText('X: ' + Math.floor(this.player.x) + ' | Y: ' + Math.floor(this.player.y));
            }

            if (this.updateInventoryUI) this.updateInventoryUI();

            if (this.fKey && this.fKey.isDown && !this.fWasDown) {
                this.showDebug = !this.showDebug;
                if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = this.showDebug;
                this.physics.world.drawDebug = this.showDebug;
            }
            this.fWasDown = this.fKey ? this.fKey.isDown : false;

            if (this.gKey && this.gKey.isDown && !this.gWasDown) {
                this.showZones = !this.showZones;
                if (this.zoneGraphics) this.zoneGraphics.setVisible(this.showZones);
            }
            this.gWasDown = this.gKey ? this.gKey.isDown : false;

            if (this.qKey && this.qKey.isDown && !this.qWasDown) {
                this.showInventory = !this.showInventory;
            }
            this.qWasDown = this.qKey ? this.qKey.isDown : false;

            if (this.sys.game.device.os.desktop && this.speedReady && this.player && this.wasd) {
                const speed = 800;
                const drag = 0.95;
                const gravity = 30;
                
                let ax = 0, ay = gravity;
                if (this.wasd.A && this.wasd.A.isDown) ax = -speed;
                if (this.wasd.D && this.wasd.D.isDown) ax = speed;
                if (this.wasd.W && this.wasd.W.isDown) ay = -speed;
                if (this.wasd.S && this.wasd.S.isDown) ay = speed;

                const vx = this.player.body.velocity.x + ax * (1/60);
                const vy = this.player.body.velocity.y + ay * (1/60);
                
                let finalVx = vx * drag;
                let finalVy = vy * drag;
                
                // С тросом — без замедления при подъёме, просто тащим
                
                this.player.setVelocity(finalVx, finalVy);
                
                const maxSpeed = 1000;
                const spd = Math.sqrt(finalVx*finalVx + finalVy*finalVy);
                if (spd > maxSpeed) {
                    this.player.setVelocity(finalVx * maxSpeed / spd, finalVy * maxSpeed / spd);
                }

                if (Math.abs(finalVx) < 1 && Math.abs(finalVy) < 1 && ax === 0 && ay === gravity) {
                    this.player.setVelocity(0, gravity);
                }
            }
        }
    }

                    action: scene.hasFishingRod && !scene.hasKey ? 'lake' : 'noRod',

                });

                    if (!s.taken) zones.push({ x: s.x, y: s.y, range: 40, action: 'stick' + i, color: 0x996633 });

                    showThought('Это океан. Мы оттуда приплыли.', 2500);
                } else if (scene.currentAction === 'door') {
                    showThought('Ключ подходит! 🔑', 2000);
                    scene.time.delayedCall(2000, () => {
                        scene.cameras.main.fadeOut(800, 0, 0, 0);
                        scene.time.delayedCall(800, () => { scene.scene.start('ChereshaScene'); });
                    });
                } else if (scene.currentAction === 'lockedDoor') {
                    showThought('Заперто. Нужен ключ. Может, в океане?', 2500);
                } else if (scene.currentAction === 'kira') {
                    showThought('Кира: "Я пока тут подожду. Поймай ключ в океане!"', 2500);
                }
                
                if (thoughtTimer) clearTimeout(thoughtTimer);
                thoughtTimer = setTimeout(hideThought, 2500);
            }

            this.actionKey.on('down', doAction);

            // Рыбалка
            this.input.keyboard.addKey('E').on('down', () => {
                if (!scene.fishingActive) return;
                
                const barLeft = scene.fishBarX;
                const barRight = scene.fishBarX + 20;
                const targetX = scene.fishTargetX;
                
                if (targetX >= barLeft - 4 && targetX <= barRight + 4) {
                    scene.fishProgress++;
                    scene.fishTargetX = Phaser.Math.Between(180, 420);
                    if (scene.fishProgress >= 3) {
                        scene.fishingActive = false;
                        scene.fishingUI.setVisible(false);
                        scene.hasKey = true;
                        scene.inventory.push('Ключ');
                        showPickup('🔑 Ключ найден! К дому!');
                        showThought('Ключ! 🔑 Он был в рыбе! Теперь к дому!', 3000);
                        thoughtTimer = setTimeout(hideThought, 3000);
                    }
                } else {
                    scene.fishProgress = Math.max(0, scene.fishProgress - 1);
                }
            });

            this.checkZones = function() {
                if (scene.fishingActive || scene.dialogueActive) {
                    scene.actionButton.setAlpha(0);
                    return;
                }
                const zones = scene.getActionZones();
                let found = null;
                for (const z of zones) {
                    if (z.isRect) {
                        if (scene.player.x > z.x && scene.player.x < z.x + z.w &&
                            scene.player.y > z.y && scene.player.y < z.y + z.h) {
                            found = z; break;
                        }
                    } else {
                        if (Phaser.Math.Distance.Between(scene.player.x, scene.player.y, z.x, z.y) < z.range) { found = z; break; }
                    }
                }
                if (found) {
                    scene.currentAction = found.action;
                    scene.actionButton.setAlpha(1);
                    // Нормальные названия
                    switch(found.action) {
                        case 'lake': scene.actionButton.setText('[E] Ловить рыбу'); break;
                        case 'noRod': scene.actionButton.setText('[E] Океан'); break;
                        case 'door': scene.actionButton.setText('[E] Открыть дверь'); break;
                        case 'lockedDoor': scene.actionButton.setText('[E] Дверь'); break;
                        case 'kira': scene.actionButton.setText('[E] Кира'); break;
                        case 'workbench': scene.actionButton.setText('[E] Верстак'); break;
                        default:
                            if (found.action.startsWith('stick')) scene.actionButton.setText('[E] Палка');
                            else if (found.action.startsWith('web')) scene.actionButton.setText('[E] Паутина');
                            else scene.actionButton.setText('[E]');
                    }
                } else {
                    scene.currentAction = null;
                    scene.actionButton.setAlpha(0);
                }
            };

            this.updateFishing = function() {
                if (!scene.fishingActive) return;
                
                // Бар ездит по всей ширине рамки: 170-450 (рамка 170-470)
                const barMin = 175;
                const barMax = 445;
                const range = (barMax - barMin) / 2;
                const center = (barMin + barMax) / 2;
                scene.fishBarX = center + Math.sin(scene.time.now / 400) * range;
                scene.fishBar.x = scene.fishBarX;
                scene.fishBar.y = 300;
                
                scene.fishTarget.x = scene.fishTargetX;
                scene.fishTarget.y = 300;
                
                const progressColors = [0xff4444, 0xff8844, 0xffaa44, 0x44ff44];
                scene.fishBar.fillColor = progressColors[Math.min(scene.fishProgress, 3)];
            };

            this.updateResourceText = function() {
                scene.resourceText.setText(
                    '🌿 Палки: ' + scene.sticks + '/3  🕸️ Паутина: ' + scene.webs + '/2  🎣 ' + (scene.hasFishingRod ? '✅' : '❌') + '  🔑 ' + (scene.hasKey ? '✅' : '❌')
                );
            };

            this.updateInventoryUI = function() {
                const vis = scene.showInventory;
                scene.inventoryBg.setVisible(vis); scene.invTitle.setVisible(vis); scene.inventoryText.setVisible(vis);
                if (vis) scene.inventoryText.setText(scene.inventory.length === 0 ? '  (пусто)' : scene.inventory.map(i => '  • ' + i).join('\n'));
            };

            const prevScene = this.scene.get('TitanicScene');
            if (prevScene && prevScene.inventory) this.inventory = [...prevScene.inventory];

            this.time.delayedCall(100, () => { this.speedReady = true; });
            this.time.delayedCall(500, () => showThought('Надо найти ключ от дома... Осмотрюсь.', 3000));
            console.log('✅ Сцена 8: Ползунок по всей ширине, названия кнопок.');
        }

        update() {
            if (this.updateFishing) this.updateFishing();
            if (this.updateResourceText) this.updateResourceText();

            if (this.hKey && this.hKey.isDown && !this.hWasDown) {
                this.showCoords = !this.showCoords;
                if (this.coordsText) this.coordsText.setVisible(this.showCoords);
            }
            this.hWasDown = this.hKey ? this.hKey.isDown : false;
            if (this.showCoords && this.player && this.coordsText) {
                this.coordsText.setText('X: ' + Math.floor(this.player.x) + ' | Y: ' + Math.floor(this.player.y));
            }

            if (this.checkZones && !this.fishingActive) this.checkZones();
            if (this.updateZoneGraphics) this.updateZoneGraphics();
            if (this.updateInventoryUI) this.updateInventoryUI();

            if (this.fKey && this.fKey.isDown && !this.fWasDown) {
                this.showDebug = !this.showDebug;
                if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = this.showDebug;
                this.physics.world.drawDebug = this.showDebug;
            }
            this.fWasDown = this.fKey ? this.fKey.isDown : false;

            if (this.gKey && this.gKey.isDown && !this.gWasDown) {
                this.showZones = !this.showZones;
                if (this.zoneGraphics) this.zoneGraphics.setVisible(this.showZones);
            }
            this.gWasDown = this.gKey ? this.gKey.isDown : false;

            if (this.qKey && this.qKey.isDown && !this.qWasDown) {
                this.showInventory = !this.showInventory;
            }
            this.qWasDown = this.qKey ? this.qKey.isDown : false;

            if (this.sys.game.device.os.desktop && this.speedReady && this.player && this.wasd && !this.fishingActive) {
                const speed = 250;
                this.player.setVelocity(0);
                if (this.wasd.A && this.wasd.A.isDown) this.player.setVelocityX(-speed);
                if (this.wasd.D && this.wasd.D.isDown) this.player.setVelocityX(speed);
                if (this.wasd.W && this.wasd.W.isDown) this.player.setVelocityY(-speed);
                if (this.wasd.S && this.wasd.S.isDown) this.player.setVelocityY(speed);
                const vx = this.player.body.velocity.x, vy = this.player.body.velocity.y;
                if (vx !== 0 && vy !== 0) {
                    this.player.setVelocity(vx * speed / Math.sqrt(vx*vx+vy*vy), vy * speed / Math.sqrt(vx*vx+vy*vy));
                }
            }
        }
    }

    // ==================== СЦЕНА 9: В ГОСТЯХ У ЧЕРЕМШИ ====================
    class ChereshaScene extends Phaser.Scene {
        constructor() { super('ChereshaScene'); }

        create() {
            const W = 640, H = 480;
            const S = 3;
            
            if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = false;
            this.physics.world.drawDebug = false;

            const bg = this.add.graphics();
            bg.fillStyle(0x8B6914, 1); bg.fillRect(0, 0, W, H);
            bg.lineStyle(1, 0x7B5914, 0.2);
            for (let x = 0; x < W; x += 32) for (let y = 0; y < H; y += 32) bg.strokeRect(x, y, 32, 32);
            bg.fillStyle(0xA08050, 1);
            bg.fillRect(0, 0, W, 8); bg.fillRect(0, H-8, W, 8);
            bg.fillRect(0, 0, 8, H); bg.fillRect(W-8, 0, 8, H);
            bg.fillStyle(0x993333, 0.6);
            bg.fillRoundedRect(200, 300, 240, 120, 10);

            const obstacles = [];

            function addObstacle(x, y, w, h) {
                const obj = scene.add.zone(x + w/2, y + h/2, w, h);
                scene.physics.add.existing(obj, true);
                obj.body.setSize(w, h);
                obstacles.push(obj);
            }

            addObstacle(0, 0, W, 8);
            addObstacle(0, H-8, W, 8);
            addObstacle(0, 0, 8, H);
            addObstacle(W-8, 0, 8, H);

            // Камин
            const fireplace = this.add.image(100, 72, 'kamin').setDisplaySize(64*S, 32*S);
            this.physics.add.existing(fireplace, true);
            fireplace.body.setSize(64*S, 32*S);

            // Диван

            sofa.setStrokeStyle(2, 0x664422);
            this.physics.add.existing(sofa, true);
            sofa.body.setSize(80*S, 20*S);
            obstacles.push(sofa);

            // Стол
            const table = this.add.rectangle(500, 360, 50*S, 24*S, 0x6B4914);
            table.setStrokeStyle(2, 0x4B2904);
            this.physics.add.existing(table, true);
            table.body.setSize(50*S, 24*S);
            obstacles.push(table);
            this.add.circle(490, 350, 5*S, 0xDDDDDD).setDepth(1);
            this.add.circle(510, 350, 5*S, 0xDDDDDD).setDepth(1);

            // Черемша

            cheresha.fillStyle(0xDDBB66, 1);
            cheresha.fillCircle(400, 300, 20);
            cheresha.fillStyle(0x000000, 1);
            cheresha.fillCircle(393, 293, 3);
            cheresha.fillCircle(407, 293, 3);
            cheresha.fillRect(395, 305, 10, 2);
            cheresha.lineStyle(2, 0x997733, 1);
            cheresha.lineBetween(390, 320, 385, 335);
            cheresha.lineBetween(400, 320, 400, 338);
            cheresha.lineBetween(410, 320, 415, 335);
            
            const chereshaBody = this.add.zone(400, 300, 40, 50);
            this.physics.add.existing(chereshaBody, true);

            // Кира (выше на 30 — y=310 вместо 340)

            this.add.circle(544, 302, 2*S, 0x000000).setDepth(9);
            this.add.circle(556, 302, 2*S, 0x000000).setDepth(9);
            this.add.rectangle(550, 314, 8*S, 2*S, 0x000000).setDepth(9);
            const kiraBody = this.add.zone(550, 310, 20*S, 24*S);
            this.physics.add.existing(kiraBody, true);
            kiraBody.body.setSize(20*S, 24*S);
            obstacles.push(kiraBody);

            // === ИГРОК ===
            this.player = this.physics.add.sprite(150, 300, 'seva');
            this.player.setScale(S);
            this.player.setCollideWorldBounds(true);
            this.player.setDepth(10);
            this.player.body.setSize(14, 24);
            this.player.body.setOffset(9, 4);

            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

            // === UI ===
            this.add.text(10, 10, 'F-хитбоксы G-зоны Q-инвентарь H-коорд', {
                fontSize: '9px', fill: '#aaaaaa', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setScrollFactor(0).setDepth(100);

            this.thoughtText = this.add.text(320, 470, '', {
                fontSize: '14px', fill: '#ffffff', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3,
