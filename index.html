            }).setOrigin(0.5, 1).setScrollFactor(0).setAlpha(0).setDepth(20);

            this.actionButton = this.add.text(580, 340, '[E]', {
                fontSize: '16px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3,

            }).setOrigin(0.5).setScrollFactor(0).setAlpha(0).setDepth(20);

            this.inventoryBg = this.add.rectangle(320, 420, 300, 160, 0x222222, 0.9).setStrokeStyle(2, 0x888888);

            this.invTitle = this.add.text(320, 350, 'ИНВЕНТАРЬ', {
                fontSize: '14px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2

            this.inventoryText = this.add.text(200, 380, '', {

                if (!scene.zoneGraphics) return;

                if (!scene.showZones) return;
                const zones = scene.getActionZones();

                for (const z of zones) {
                    scene.zoneGraphics.fillStyle(z.color || 0xffffff, 0.2);
                    scene.zoneGraphics.fillCircle(z.x, z.y, z.range);
                    scene.zoneGraphics.lineStyle(2, z.color || 0xffffff, 0.8);

                scene.thoughtText.setText(text); scene.thoughtText.setAlpha(1);
            }
            function hideThought() { 
                scene.thoughtText.setAlpha(0); 
                scene.dialogueActive = false;
            }

                scene.dialogueActive = true;
                scene.actionButton.setAlpha(0);

                scene.thoughtText.setText(text); scene.thoughtText.setAlpha(1);

                if (scene.dialogueActive) return;

                if (thoughtTimer) clearTimeout(thoughtTimer); hideThought();

                switch(scene.currentAction) {
                    case 'cheresha':
                        if (scene.metCheresha) {
                            showThought('Черемша: "Угощайтесь чаем, не стесняйтесь!"', 2500);

                                scene.metCheresha = true;
                            });

                    case 'kira':
                        if (!scene.metCheresha) {
                            doStoryThought('Кира: "Поздоровайся с Черемшой сначала!"', 2500);
                        } else if (!scene.talkedToKira) {
                            doStoryThought('Сева: "Кира, я хочу к Тому. Составишь компанию?"', 3000);

                            });

                            showThought('Кира: "Иди к Тому! Увидимся позже!"', 2500);
                            thoughtTimer = setTimeout(hideThought, 2500);
                        }
                        break;
                        
                    case 'fireplace':
                        if (scene.talkedToKira) {
                            doStoryThought('Использовать летучий порох? Летим к Тому! ✨', 2000);
                            scene.time.delayedCall(2000, () => {
                                scene.cameras.main.fadeOut(800, 0, 0, 0);
                                scene.time.delayedCall(800, () => {
                                    scene.scene.start('TomScene'); // потом TomScene
                                });
                            });
                        } else {

                        }

                for (const z of zones) {
                    if (Phaser.Math.Distance.Between(scene.player.x, scene.player.y, z.x, z.y) < z.range) { found = z; break; }
                }
                if (found) {
                    scene.currentAction = found.action;
                    scene.actionButton.setAlpha(1);
                    switch(found.action) {
                        case 'cheresha': scene.actionButton.setText('[E] Черемша'); break;
                        case 'kira': scene.actionButton.setText('[E] Кира'); break;
                        case 'fireplace': scene.actionButton.setText('[E] Камин'); break;
                    }
                } else {
                    scene.currentAction = null;
                    scene.actionButton.setAlpha(0);
                }
            };

            this.updateInventoryUI = function() {
                const vis = scene.showInventory;
                scene.inventoryBg.setVisible(vis); scene.invTitle.setVisible(vis); scene.inventoryText.setVisible(vis);
                if (vis) scene.inventoryText.setText(scene.inventory.length === 0 ? '  (пусто)' : scene.inventory.map(i => '  • ' + i).join('\n'));
            };

            const prevScene = this.scene.get('ShoreScene');
            if (prevScene && prevScene.inventory) this.inventory = [...prevScene.inventory];

            this.time.delayedCall(100, () => { this.speedReady = true; });
            this.time.delayedCall(500, () => showThought('Как тут уютно... Черемша!', 3000));
            console.log('✅ Сцена 9: Черемша, Кира выше, мысли о друзьях.');
        }

        update() {
            if (this.hKey && this.hKey.isDown && !this.hWasDown) {
                this.showCoords = !this.showCoords;
                if (this.coordsText) this.coordsText.setVisible(this.showCoords);
            }
            this.hWasDown = this.hKey ? this.hKey.isDown : false;
            if (this.showCoords && this.player && this.coordsText) {

        }
    }

    // ==================== СЦЕНА 10: У ТОМА ====================
    class TomScene extends Phaser.Scene {
        constructor() { super('TomScene'); }

        create() {
            const W = 640, H = 480;
            const worldW = 1200, worldH = 480;
            const S = 3;
            
            if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = false;
            this.physics.world.drawDebug = false;

            this.player = null; this.wasd = {}; this.actionButton = null;
            this.currentAction = null; this.thoughtText = null; this.actionKey = null;
            this.showDebug = false; this.fKey = null; this.fWasDown = false;
            this.showZones = false; this.gKey = null; this.gWasDown = false;
            this.qKey = null; this.qWasDown = false;
            this.hKey = null; this.hWasDown = false; this.showCoords = false; this.coordsText = null;
            this.inventory = []; this.inventoryText = null; this.inventoryBg = null;
            this.invTitle = null; this.showInventory = false;
            this.zoneGraphics = null;
            this.speedReady = false;
            this.dialogueActive = false;
            this.canMove = true;
            
            this.phase = 0;
            this.metRimus = false;
            this.metTom = false;
            this.fallTriggered = false;

            this.cameras.main.setBounds(0, 0, worldW, worldH);
            this.physics.world.setBounds(0, 0, worldW, worldH);
            this.cameras.main.fadeIn(1500, 0, 0, 0);

            const scene = this;

            // === ФОН ===
            const bg = this.add.graphics();
            bg.fillStyle(0x1a1a1a, 1);
            bg.fillRect(0, 0, worldW, worldH);

            const obstacles = [];

            function addObstacle(x, y, w, h) {
                const obj = scene.add.zone(x + w/2, y + h/2, w, h);
                scene.physics.add.existing(obj, true);
                obj.body.setSize(w, h);
                obstacles.push(obj);
            }

            // === СТЕНЫ ===
            const walls = this.add.graphics();
            walls.fillStyle(0x444444, 1);
            
            walls.fillRect(0, 0, worldW, 8);
            walls.fillRect(0, worldH-8, worldW, 8);
            walls.fillRect(0, 0, 8, worldH);
            walls.fillRect(worldW-8, 0, 8, worldH);
            addObstacle(0, 0, worldW, 8);
            addObstacle(0, worldH-8, worldW, 8);
            addObstacle(0, 0, 8, worldH);
            addObstacle(worldW-8, 0, 8, worldH);

            // Коридор
            walls.fillRect(0, 0, 320, 160);
            addObstacle(0, 0, 320, 160);
            walls.fillRect(0, 320, 320, 160);
            addObstacle(0, 320, 320, 160);
            walls.fillRect(320, 0, 8, 180);
            addObstacle(320, 0, 8, 180);
            walls.fillRect(320, 300, 8, 180);
            addObstacle(320, 300, 8, 180);

            // Стена гостиной (скрыта)
            this.livingWall = this.add.graphics();
            this.livingWall.fillStyle(0x4a3a2a, 1);
            this.livingWall.fillRect(600, 0, 8, 200);
            this.livingWall.fillRect(600, 320, 8, 160);
            this.livingWall.setVisible(false);
            const lwTop = this.add.zone(604, 100, 8, 200);
            const lwBot = this.add.zone(604, 400, 8, 160);
            this.physics.add.existing(lwTop, true); lwTop.body.setSize(8, 200); lwTop.setVisible(false);
            this.physics.add.existing(lwBot, true); lwBot.body.setSize(8, 160); lwBot.setVisible(false);
            this.livingObstacles = [lwTop, lwBot];

            // === КОВРИК И РИМУС (скрыты) ===
            this.rugGfx = this.add.graphics();
            this.rugGfx.fillStyle(0x664444, 0.6);
            this.rugGfx.fillRoundedRect(200, 220, 80, 40, 6);
            this.rugGfx.setVisible(false);

            this.rimusGfx = this.add.graphics().setDepth(8);
            this.rimusGfx.fillStyle(0xCC9966, 1);
            this.rimusGfx.fillRect(230, 230, 42, 21);
            this.rimusGfx.fillStyle(0x000000, 1);
            this.rimusGfx.fillCircle(235, 237, 3);
            this.rimusGfx.fillRect(242, 242, 8, 2);
            this.rimusGfx.setVisible(false);

            this.rimusBody = this.add.zone(250, 240, 14*S, 20*S);
            this.physics.add.existing(this.rimusBody, true);
            this.rimusBody.body.setSize(14*S, 20*S);
            this.rimusBody.setVisible(false);

            // === ГОСТИНАЯ ===
            const sofa = this.add.rectangle(850, 380, 80*S, 20*S, 0x664422);
            sofa.setStrokeStyle(2, 0x442200);
            this.physics.add.existing(sofa, true);
            sofa.body.setSize(80*S, 20*S);
            obstacles.push(sofa);

            const tomGfx = this.add.graphics().setDepth(8);
            tomGfx.fillStyle(0x33AA33, 1);
            tomGfx.fillRect(870, 320, 20*S, 24*S);
            tomGfx.fillStyle(0x000000, 1);
            tomGfx.fillCircle(864, 312, 2*S);
            tomGfx.fillCircle(876, 312, 2*S);
            tomGfx.fillRect(870, 326, 6*S, 2*S);
            
            const tomBody = this.add.zone(870, 320, 20*S, 24*S);
            this.physics.add.existing(tomBody, true);
            tomBody.body.setSize(20*S, 24*S);
            obstacles.push(tomBody);

            const projector = this.add.rectangle(950, 340, 12*S, 8*S, 0x333333);
            projector.setStrokeStyle(1, 0x555555);
            this.add.triangle(950, 330, 0, 0, 12*S, 0, 6*S, -8*S, 0x444444);

            // === ИГРОК ===
            this.player = this.physics.add.sprite(60, 240, 'seva');
            this.player.setScale(S);
            this.player.setCollideWorldBounds(true);
            this.player.setDepth(10);
            this.player.body.setSize(14, 20);
            this.player.body.setOffset(9, 8);

            this.physics.add.collider(this.player, obstacles);
            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

            // === ТЕМНОТА ===
            this.darkOverlay = this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.85);
            this.darkOverlay.setDepth(50).setScrollFactor(0);

            // === UI ===
            this.add.text(10, 10, 'F-хитбоксы G-зоны Q-инвентарь H-коорд', {
                fontSize: '9px', fill: '#aaaaaa', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setScrollFactor(0).setDepth(100);

            this.thoughtText = this.add.text(320, 470, '', {
                fontSize: '14px', fill: '#ffffff', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3,
                wordWrap: { width: 620 }, align: 'center'
            }).setOrigin(0.5, 1).setScrollFactor(0).setAlpha(0).setDepth(60);

            this.actionButton = this.add.text(580, 340, '[E]', {
                fontSize: '16px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3,
                backgroundColor: '#333333', padding: { x: 6, y: 3 }
            }).setOrigin(0.5).setScrollFactor(0).setAlpha(0).setDepth(60);

            this.inventoryBg = this.add.rectangle(320, 420, 300, 160, 0x222222, 0.9).setStrokeStyle(2, 0x888888);
            this.inventoryBg.setScrollFactor(0).setDepth(30).setVisible(false);
            this.invTitle = this.add.text(320, 350, 'ИНВЕНТАРЬ', {
                fontSize: '14px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setOrigin(0.5).setScrollFactor(0).setDepth(31).setVisible(false);
            this.inventoryText = this.add.text(200, 380, '', {
                fontSize: '12px', fill: '#ffffff', fontFamily: 'monospace', wordWrap: { width: 240 }
            }).setScrollFactor(0).setDepth(31).setVisible(false);

            this.coordsText = this.add.text(10, 25, '', {
                fontSize: '9px', fill: '#00ff00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2
            }).setScrollFactor(0).setDepth(100).setVisible(false);

            this.zoneGraphics = this.add.graphics().setDepth(6).setVisible(false);

            this.wasd.W = this.input.keyboard.addKey('W');
            this.wasd.A = this.input.keyboard.addKey('A');
            this.wasd.S = this.input.keyboard.addKey('S');
            this.wasd.D = this.input.keyboard.addKey('D');
            this.actionKey = this.input.keyboard.addKey('E');
            this.fKey = this.input.keyboard.addKey('F');
            this.gKey = this.input.keyboard.addKey('G');
            this.qKey = this.input.keyboard.addKey('Q');
            this.hKey = this.input.keyboard.addKey('H');

            this.updateZoneGraphics = function() {
                if (!scene.zoneGraphics) return;
                scene.zoneGraphics.clear();
                if (!scene.showZones) return;
                const zones = scene.getActionZones();
                if (!zones) return;
                for (const z of zones) {
                    scene.zoneGraphics.fillStyle(z.color || 0xffffff, 0.2);
                    scene.zoneGraphics.fillCircle(z.x, z.y, z.range);
                    scene.zoneGraphics.lineStyle(2, z.color || 0xffffff, 0.8);
                    scene.zoneGraphics.strokeCircle(z.x, z.y, z.range);
                }
            };

            let thoughtTimer = null;

            function showThought(text, duration = 3000) {
                scene.thoughtText.setText(text); scene.thoughtText.setAlpha(1);
            }
            function hideThought() { 
                scene.thoughtText.setAlpha(0); 
                scene.dialogueActive = false;
            }
            function doStoryThought(text, duration = 3000) {
                scene.dialogueActive = true;
                scene.actionButton.setAlpha(0);
                if (thoughtTimer) clearTimeout(thoughtTimer);
                scene.thoughtText.setText(text); scene.thoughtText.setAlpha(1);
                thoughtTimer = setTimeout(hideThought, duration);
            }

            // === ТРИГГЕР ПАДЕНИЯ ===
            this.checkFall = function() {
                if (!this.fallTriggered && this.player && this.player.x > 280 && this.phase === 0) {
                    this.fallTriggered = true;
                    this.canMove = false;
                    this.dialogueActive = true;
                    // Сбрасываем скорость, чтобы не проехать дальше
                    this.player.setVelocity(0, 0);
                    
                    scene.tweens.add({
                        targets: scene.player,
                        y: scene.player.y + 50,
                        angle: 80,
                        duration: 600,
                        ease: 'Quad.easeIn',
                        onComplete: () => {
                            scene.player.angle = 0;
                            scene.player.y -= 30;
                            doStoryThought('Ай! Обо что-то запнулась...', 2500);
                            scene.time.delayedCall(2500, () => {
                                // Свет!
                                scene.tweens.add({
                                    targets: scene.darkOverlay,
                                    alpha: 0,
                                    duration: 1200,
                                    ease: 'Quad.easeOut'
                                });
                                scene.livingWall.setVisible(true);
                                scene.livingObstacles.forEach(o => {
                                    o.setVisible(true);
                                    scene.physics.add.collider(scene.player, o);
                                });
                                scene.rugGfx.setVisible(true);
                                scene.rimusGfx.setVisible(true);
                                scene.rimusBody.setVisible(true);
                                scene.physics.add.collider(scene.player, scene.rimusBody);
                                
                                doStoryThought('*Свет включился*', 2000);
                                scene.time.delayedCall(2000, () => {
                                    doStoryThought('Римус: "МММ?? Кто здесь? А, Сева!"', 3000);
                                    scene.phase = 1;
                                    scene.metRimus = true;
                                    scene.canMove = true;
                                });
                            });
                        }
                    });
                }
            };

            scene.getActionZones = function() {
                const zones = [];
                if (scene.phase >= 1 && !scene.metTom) zones.push({ x: 250, y: 240, range: 70, action: 'rimus', color: 0xCC9966 });
                if (scene.phase >= 1) zones.push({ x: 870, y: 320, range: 70, action: 'tom', color: 0x33AA33 });
                return zones;
            };

            function doAction() {
                if (scene.dialogueActive || scene.phase === 0) return;
                if (!scene.currentAction) return;
                if (thoughtTimer) clearTimeout(thoughtTimer); hideThought();

                switch(scene.currentAction) {
                    case 'rimus':
                        if (!scene.metTom) {
                            doStoryThought('Римус: "Сева! С днём рождения! Том в гостиной, иди к нему!"', 3500);
                            scene.time.delayedCall(3500, () => {
                                doStoryThought('Сева: "Спасибо! А ты чего на полу?"', 2500);
                            });
                            scene.time.delayedCall(6000, () => {
                                doStoryThought('Римус: "У меня новая идея... расскажу позже."', 3000);
                            });
                        } else {
                            showThought('Римус: "Иди, он тебя ждёт!"', 2000);
                            thoughtTimer = setTimeout(hideThought, 2000);
                        }
                        break;
                        
                    case 'tom':
                        if (!scene.metTom) {
                            scene.metTom = true;
                            doStoryThought('Том: "Сева! С днём рождения!!" 🎉', 3000);
                            scene.time.delayedCall(3000, () => {
                                doStoryThought('Сева: "Том! Спасибо! У вас тут темнота..."', 2500);
                            });
                            scene.time.delayedCall(5500, () => {
                                doStoryThought('Том: "Пойдём, мы кое-что приготовили. Садись на диван."', 3500);
                            });
                            scene.time.delayedCall(9000, () => {
                                doStoryThought('*Все садятся. Том включает проектор...*', 3000);
                            });
                            scene.time.delayedCall(12000, () => {
                                scene.cameras.main.fadeOut(1000, 0, 0, 0);
                                scene.time.delayedCall(1000, () => {
                                    scene.scene.start('SpaceScene'); // потом ProjectorScene
                                });
                            });
                        }
                        break;
                }
            }

            this.actionKey.on('down', doAction);

            this.checkZones = function() {
                if (scene.dialogueActive || scene.phase === 0) {
                    scene.actionButton.setAlpha(0);
                    return;
                }
                const zones = scene.getActionZones();
                let found = null;
                for (const z of zones) {
                    if (Phaser.Math.Distance.Between(scene.player.x, scene.player.y, z.x, z.y) < z.range) { found = z; break; }
                }
                if (found) {
                    scene.currentAction = found.action;
                    scene.actionButton.setAlpha(1);
                    switch(found.action) {
                        case 'rimus': scene.actionButton.setText('[E] Римус'); break;
                        case 'tom': scene.actionButton.setText('[E] Том'); break;
                    }
                } else {
                    scene.currentAction = null;
                    scene.actionButton.setAlpha(0);
                }
            };

            this.updateInventoryUI = function() {
                const vis = scene.showInventory;
                scene.inventoryBg.setVisible(vis); scene.invTitle.setVisible(vis); scene.inventoryText.setVisible(vis);
                if (vis) scene.inventoryText.setText(scene.inventory.length === 0 ? '  (пусто)' : scene.inventory.map(i => '  • ' + i).join('\n'));
            };

            const prevScene = this.scene.get('ChereshaScene');
            if (prevScene && prevScene.inventory) this.inventory = [...prevScene.inventory];

            this.time.delayedCall(100, () => { this.speedReady = true; });
            this.time.delayedCall(500, () => doStoryThought('Тут так темно... Надо пройти вперёд.', 3000));
            console.log('✅ Сцена 10: фикс скорости при падении.');
        }

        update() {
            if (this.checkFall) this.checkFall();

            if (this.hKey && this.hKey.isDown && !this.hWasDown) {
                this.showCoords = !this.showCoords;
                if (this.coordsText) this.coordsText.setVisible(this.showCoords);
            }
            this.hWasDown = this.hKey ? this.hKey.isDown : false;
            if (this.showCoords && this.player && this.coordsText) {
                this.coordsText.setText('X: ' + Math.floor(this.player.x) + ' | Y: ' + Math.floor(this.player.y));
            }

            if (this.checkZones) this.checkZones();
            if (this.updateZoneGraphics) this.updateZoneGraphics();
            if (this.updateInventoryUI) this.updateInventoryUI();

            if (this.fKey && this.fKey.isDown && !this.fWasDown) {
                this.showDebug = !this.showDebug;
                if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = this.showDebug;
                this.physics.world.drawDebug = this.showDebug;
            }
            this.fWasDown = this.fKey ? this.fKey.isDown : false;

            if (this.gKey && this.gKey.isDown && !this.gWasDown) {
                this.showZones = !this.showZones;
                if (this.zoneGraphics) this.zoneGraphics.setVisible(this.showZones);
            }
            this.gWasDown = this.gKey ? this.gKey.isDown : false;

            if (this.qKey && this.qKey.isDown && !this.qWasDown) {
                this.showInventory = !this.showInventory;
            }
            this.qWasDown = this.qKey ? this.qKey.isDown : false;

            if (this.sys.game.device.os.desktop && this.speedReady && this.player && this.wasd && this.canMove && !this.dialogueActive) {
                const speed = 250;
                this.player.setVelocity(0);
                if (this.wasd.A && this.wasd.A.isDown) this.player.setVelocityX(-speed);
                if (this.wasd.D && this.wasd.D.isDown) this.player.setVelocityX(speed);
                if (this.wasd.W && this.wasd.W.isDown) this.player.setVelocityY(-speed);
                if (this.wasd.S && this.wasd.S.isDown) this.player.setVelocityY(speed);
                const vx = this.player.body.velocity.x, vy = this.player.body.velocity.y;
                if (vx !== 0 && vy !== 0) {
                    this.player.setVelocity(vx * speed / Math.sqrt(vx*vx+vy*vy), vy * speed / Math.sqrt(vx*vx+vy*vy));
                }
            }
        }
    }
    
    // ==================== КОНФИГ ====================
    const config = {
        type: Phaser.AUTO,
        width: 640,
        height: 480,
        backgroundColor: '#0a0a2e',
        physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: true } },
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_HORIZONTALLY,
            autoRound: true
        },
        scene: [StartScene, RoomScene, LupinScene, BaseScene, SpaceScene, DiveScene, TitanicScene, ShoreScene, ChereshaScene, TomScene]
    };

    const game = new Phaser.Game(config);
    console.log('🎮 Игра готова!');
    
    // Полноэкранный режим + ландшафт
    function goFullscreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) {
            el.requestFullscreen().catch(() => {});
        } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
        }
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    }
    document.addEventListener('click', goFullscreen);
    document.addEventListener('touchstart', goFullscreen);
};
</script>
</body>
</html>
