    <style>

        #noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E"); background-size: 256px 256px; animation: noise-shift 0.5s steps(3) infinite; }
        @keyframes noise-shift { 0% { background-position: 0 0; } 33% { background-position: 64px 32px; } 66% { background-position: 128px 64px; } 100% { background-position: 192px 96px; } }
        #scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 11; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px); }

    </style>
</head>
<body>

<script>
window.onload = function() {

    const S = 3;

    // ==================== СЦЕНА 0: СТАРТ ====================
    class StartScene extends Phaser.Scene {
        constructor() { super('StartScene'); }
        preload() {
            this.load.image('seva', 'Sprite-seva-glav-vniz.png');
            this.load.image('krovat', 'Sprite-krovat.png');
            this.load.image('kamin', 'Sprite-kamin.png');
            this.load.image('komod', 'Sprite-komod.png');
        }
        create() {
            const W = 640, H = 480;
            this.cameras.main.setBackgroundColor('#0a0a2e');
            for (let i = 0; i < 50; i++) {
                const x = Phaser.Math.Between(0, W), y = Phaser.Math.Between(0, H);
                const s = Phaser.Math.Between(1, 3), a = Phaser.Math.Between(3, 10) / 10;
                this.add.rectangle(x, y, s, s, 0xffffff, a);
            }
            const title = this.add.text(W/2, 120, 'Сева и пидорасы', { fontSize: '28px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 4 }); title.x = W/2 - title.width/2;
            const sub = this.add.text(W/2, 165, 'История одного дня рождения', { fontSize: '12px', fill: '#aaaaaa', fontFamily: 'monospace' }); sub.x = W/2 - sub.width/2;
            const btn = this.add.text(W/2, 300, '[ СТАРТ ]', { fontSize: '24px', fill: '#ffffff', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3, backgroundColor: '#333366', padding: { x: 20, y: 10 } }); btn.x = W/2 - btn.width/2;
            btn.setInteractive({ useHandCursor: true });
            btn.on('pointerover', () => btn.setFill('#ffdd00'));
            btn.on('pointerout', () => btn.setFill('#ffffff'));
            btn.on('pointerdown', () => { this.cameras.main.fadeOut(800, 0, 0, 0); this.time.delayedCall(800, () => this.scene.start('RoomScene')); });
            const fullBtn = this.add.text(W/2, 360, '[ НА ВЕСЬ ЭКРАН ]', { fontSize: '14px', fill: '#88aacc', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2, backgroundColor: '#222244', padding: { x: 12, y: 6 } }); fullBtn.x = W/2 - fullBtn.width/2;
            fullBtn.setInteractive({ useHandCursor: true });
            fullBtn.on('pointerover', () => fullBtn.setFill('#ffdd00'));
            fullBtn.on('pointerout', () => fullBtn.setFill('#88aacc'));
            fullBtn.on('pointerdown', () => { const el = document.documentElement; if (el.requestFullscreen) el.requestFullscreen(); else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen(); if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {}); });
            const hint = this.add.text(W/2, 440, 'Нажми СТАРТ или пробел', { fontSize: '10px', fill: '#666688', fontFamily: 'monospace' }); hint.x = W/2 - hint.width/2;
            this.input.keyboard.addKey('SPACE').on('down', () => { this.cameras.main.fadeOut(800, 0, 0, 0); this.time.delayedCall(800, () => this.scene.start('RoomScene')); });
            this.input.keyboard.addKey('THREE').on('down', () => { this.cameras.main.fadeOut(500, 0, 0, 0); this.time.delayedCall(500, () => this.scene.start('TomScene')); });
            this.cameras.main.fadeIn(1500, 0, 0, 0);
            console.log('✅ Сцена 0');
        }
    }

    // ==================== СЦЕНА 1: КОМНАТА СЕВЫ ====================
    class RoomScene extends Phaser.Scene {
        constructor() { super('RoomScene'); }
        create() {
            const W = 640, H = 480;
            if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = false;
            this.physics.world.drawDebug = false;
            this.player = null; this.wasd = {}; this.actionButton = null; this.currentAction = null; this.thoughtText = null; this.actionKey = null;
            this.showDebug = false; this.fKey = null; this.fWasDown = false; this.showZones = false; this.gKey = null; this.gWasDown = false;
            this.qKey = null; this.qWasDown = false; this.hKey = null; this.hWasDown = false; this.showCoords = false; this.coordsText = null;
            this.storyStep = 0; this.hasFluePowder = false; this.isInBed = false;
            this.inventory = []; this.inventoryText = null; this.inventoryBg = null; this.invTitle = null; this.showInventory = false;
            this.zoneGraphics = null; this.speedReady = false; this.joyStick = null; this.actionBtn = null;
            this.cameras.main.setBounds(0, 0, W, H); this.physics.world.setBounds(0, 0, W, H); this.cameras.main.fadeIn(800, 0, 0, 0);
            const bg = this.add.graphics(); bg.fillStyle(0x8B7355, 1); bg.fillRect(0, 0, W, H); bg.lineStyle(1, 0x7B6345, 0.2);
            for (let x = 0; x < W; x += 32) for (let y = 0; y < H; y += 32) bg.strokeRect(x, y, 32, 32);
            const rug = this.add.graphics(); rug.fillStyle(0xCC6644, 0.6); rug.fillRoundedRect(280, 380, 96, 40, 8); rug.setDepth(0);
            const obstacles = [];
            const bed = this.add.image(100, 72, 'krovat').setDisplaySize(64*S, 32*S); bed.setDepth(5); this.physics.add.existing(bed, true); bed.body.setSize(bed.displayWidth, bed.displayHeight); obstacles.push(bed);
            const fireplace = this.add.image(360, 72, 'kamin').setDisplaySize(64*S, 32*S); this.physics.add.existing(fireplace, true); fireplace.body.setSize(fireplace.displayWidth, fireplace.displayHeight); obstacles.push(fireplace);
            const dresser = this.add.image(40, 400, 'komod').setDisplaySize(32*S, 32*S); this.physics.add.existing(dresser, true); dresser.body.setSize(dresser.displayWidth, dresser.displayHeight); obstacles.push(dresser);
            const table = this.add.rectangle(500, 400, 40*S, 28*S, 0x8B6914).setStrokeStyle(2, 0x6B4914); this.physics.add.existing(table, true); table.body.setSize(40*S, 28*S); obstacles.push(table); this.add.circle(500, 392, 6*S, 0xDDDDDD).setStrokeStyle(1, 0x999999).setDepth(1);
            const plant = this.add.rectangle(580, 400, 16*S, 22*S, 0x336633).setStrokeStyle(2, 0x225522); this.physics.add.existing(plant, true); plant.body.setSize(16*S, 22*S); obstacles.push(plant); this.add.circle(580, 385, 8*S, 0x44AA44).setDepth(1);
            const shelf = this.add.rectangle(520, 24, 64*S, 8*S, 0x8B6914).setStrokeStyle(1, 0x6B4914); this.physics.add.existing(shelf, true); shelf.body.setSize(64*S, 8*S); obstacles.push(shelf); [0xCC3333, 0x3333CC, 0x33AA33, 0xCCCC33, 0xCC33CC].forEach((c, i) => this.add.rectangle(490+i*15, 18, 10*S, 6*S, c).setDepth(1));
            const cat = this.add.rectangle(320, 395, 14*S, 10*S, 0xFF8844).setStrokeStyle(2, 0xCC6622).setDepth(2); this.add.circle(316, 392, 2*S, 0xFFFF00).setDepth(3); this.add.circle(324, 392, 2*S, 0xFFFF00).setDepth(3); this.physics.add.existing(cat, true); cat.body.setSize(14*S, 10*S); obstacles.push(cat);
            const door = this.add.rectangle(620, 240, 10*S, 32*S, 0x6B4914).setStrokeStyle(2, 0x4B2904); this.physics.add.existing(door, true); door.body.setSize(10*S, 32*S); obstacles.push(door); this.add.circle(618, 240, 2*S, 0xFFD700).setDepth(1);
            this.player = this.physics.add.sprite(300, 300, 'seva'); this.player.setScale(S); this.player.setCollideWorldBounds(true); this.player.setDepth(10); this.player.body.setSize(14, 24); this.player.body.setOffset(9, 4);
            this.physics.add.collider(this.player, obstacles); this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
            this.add.text(10, 10, 'F-хитбоксы G-зоны Q-инвентарь H-коорд', { fontSize: '9px', fill: '#aaaaaa', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2 }).setScrollFactor(0).setDepth(100);
            this.thoughtText = this.add.text(320, 470, '', { fontSize: '14px', fill: '#ffffff', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3, wordWrap: { width: 620 }, align: 'center' }).setOrigin(0.5, 1).setScrollFactor(0).setAlpha(0).setDepth(20);
            this.actionButton = this.add.text(580, 340, '[E]', { fontSize: '16px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3, backgroundColor: '#333333', padding: { x: 6, y: 3 } }).setOrigin(0.5).setScrollFactor(0).setAlpha(0).setDepth(20);
            this.inventoryBg = this.add.rectangle(320, 420, 300, 160, 0x222222, 0.9).setStrokeStyle(2, 0x888888).setScrollFactor(0).setDepth(30).setVisible(false);
            this.invTitle = this.add.text(320, 350, 'ИНВЕНТАРЬ', { fontSize: '14px', fill: '#ffdd00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2 }).setOrigin(0.5).setScrollFactor(0).setDepth(31).setVisible(false);
            this.inventoryText = this.add.text(200, 380, '', { fontSize: '12px', fill: '#ffffff', fontFamily: 'monospace', wordWrap: { width: 240 } }).setScrollFactor(0).setDepth(31).setVisible(false);
            this.coordsText = this.add.text(10, 25, '', { fontSize: '9px', fill: '#00ff00', fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2 }).setScrollFactor(0).setDepth(100).setVisible(false);
            this.zoneGraphics = this.add.graphics().setDepth(6).setVisible(false);
            this.wasd.W = this.input.keyboard.addKey('W'); this.wasd.A = this.input.keyboard.addKey('A'); this.wasd.S = this.input.keyboard.addKey('S'); this.wasd.D = this.input.keyboard.addKey('D');
            this.actionKey = this.input.keyboard.addKey('E'); this.fKey = this.input.keyboard.addKey('F'); this.gKey = this.input.keyboard.addKey('G'); this.qKey = this.input.keyboard.addKey('Q'); this.hKey = this.input.keyboard.addKey('H');

            // === ДЖОЙСТИК + ИНВЕНТАРЬ ===
            if (true) {
                const joyX = 90, joyY = 390;
                const base = this.add.circle(joyX, joyY, 50, 0x333333, 0.5).setDepth(200).setScrollFactor(0);
                const thumb = this.add.circle(joyX, joyY, 25, 0x888888, 0.7).setDepth(201).setScrollFactor(0);
                this.joyStick = { base, thumb, forceX: 0, forceY: 0, active: false };
                this.input.on('pointerdown', (pointer) => { const dx = pointer.x - joyX, dy = pointer.y - joyY; if (Math.sqrt(dx*dx+dy*dy) < 80) this.joyStick.active = true; });
                this.input.on('pointermove', (pointer) => { if (!this.joyStick || !this.joyStick.active) return; const dx = pointer.x - joyX, dy = pointer.y - joyY, dist = Math.sqrt(dx*dx+dy*dy), maxDist = 40; if (dist > maxDist) { this.joyStick.forceX = dx/dist; this.joyStick.forceY = dy/dist; thumb.x = joyX + this.joyStick.forceX*maxDist; thumb.y = joyY + this.joyStick.forceY*maxDist; } else if (dist > 10) { this.joyStick.forceX = dx/maxDist; this.joyStick.forceY = dy/maxDist; thumb.x = pointer.x; thumb.y = pointer.y; } else { this.joyStick.forceX = 0; this.joyStick.forceY = 0; thumb.x = joyX; thumb.y = joyY; } });
                this.input.on('pointerup', () => { if (this.joyStick) { this.joyStick.active = false; this.joyStick.forceX = 0; this.joyStick.forceY = 0; thumb.x = joyX; thumb.y = joyY; } });
                const btnX = 550, btnY = 390;
                this.actionBtn = this.add.circle(btnX, btnY, 30, 0xffdd00, 0.6).setDepth(200).setScrollFactor(0);
                this.add.text(btnX, btnY, 'E', { fontSize: '20px', fill: '#000000', fontFamily: 'monospace' }).setOrigin(0.5).setDepth(201).setScrollFactor(0);
                this.actionBtn.setInteractive({ useHandCursor: true });
                this.actionBtn.on('pointerdown', () => { if (this.actionKey) this.actionKey.emit('down'); if (typeof doAction === 'function') doAction(); });
                this.actionBtn.on('pointerup', () => { if (this.actionKey) this.actionKey.emit('up'); });
                const invX = 550, invY = 460;
                const invBtn = this.add.circle(invX, invY, 22, 0x8888cc, 0.6).setDepth(200).setScrollFactor(0);
                this.add.text(invX, invY, '📦', { fontSize: '14px', fontFamily: 'monospace' }).setOrigin(0.5).setDepth(201).setScrollFactor(0);
                invBtn.setInteractive({ useHandCursor: true });
                invBtn.on('pointerdown', () => { this.showInventory = !this.showInventory; });
            }

            const scene = this; let thoughtTimer = null;
            function showThought(text, duration = 3000) { scene.thoughtText.setText('Мысли: ' + text); scene.thoughtText.setAlpha(1); }
            function hideThought() { scene.thoughtText.setAlpha(0); }
            function doStoryThought(text, duration = 3000) { if (thoughtTimer) clearTimeout(thoughtTimer); scene.thoughtText.setText(text); scene.thoughtText.setAlpha(1); thoughtTimer = setTimeout(hideThought, duration); }
            scene.getActionZones = function() { return [{ x: 100, y: 72, range: 110, action: 'krovat', color: 0xff4444 }, { x: 360, y: 72, range: 110, action: 'kamin', color: 0xff8800 }, { x: 40, y: 400, range: 90, action: 'komod', color: 0x44aaff }, { x: 320, y: 395, range: 55, action: 'cat', color: 0x44ff44 }, { x: 500, y: 400, range: 80, action: 'table', color: 0xffff44 }, { x: 620, y: 240, range: 55, action: 'door', color: 0xff44ff }]; };
            function doAction() { if (!scene.currentAction) return; if (thoughtTimer) clearTimeout(thoughtTimer); hideThought(); switch(scene.currentAction) { case 'krovat': if (scene.storyStep === 0) { scene.isInBed = true; scene.player.setDepth(15); scene.player.setAngle(-90); scene.player.y = 84; scene.player.body.enable = false; scene.actionButton.setAlpha(0); doStoryThought('Zzz...', 2000); setTimeout(() => { doStoryThought('А блять сегодня же с Кирой в гости к Черемше...', 3000); setTimeout(() => { scene.isInBed = false; scene.player.setAngle(0); scene.player.setDepth(10); scene.player.y = 140; scene.player.body.enable = true; scene.storyStep = 1; doStoryThought('Вроде летучий порох в комоде рядом с мамиными таро лежит...', 3000); }, 3000); }, 2000); } else if (scene.storyStep >= 1 && scene.isInBed) { scene.isInBed = false; scene.player.setAngle(0); scene.player.setDepth(10); scene.player.y = 140; scene.player.body.enable = true; doStoryThought('Вроде летучий порох в комоде рядом с мамиными таро лежит...', 3000); } else { showThought('Я уже выспалась...'); thoughtTimer = setTimeout(hideThought, 2000); } break; case 'kamin': if (scene.hasFluePowder) { doStoryThought('Пора берлогу римуса посетить', 1500); scene.time.delayedCall(1500, () => { scene.cameras.main.fadeOut(800,0,0,0); scene.time.delayedCall(800, () => scene.scene.start('LupinScene')); }); } else { showThought('Нужен летучий порох...'); thoughtTimer = setTimeout(hideThought, 2000); } break; case 'komod': if (!scene.hasFluePowder && scene.storyStep >= 1) { scene.hasFluePowder = true; scene.inventory.push('Летучий порох'); scene.storyStep = 2; doStoryThought('Теперь с разбегу в камин', 2500); } else if (scene.hasFluePowder) { showThought('Я уже взяла порох.'); thoughtTimer = setTimeout(hideThought, 2000); } else { showThought('Пока не время...'); thoughtTimer = setTimeout(hideThought, 2000); } break; case 'cat': showThought('Мяу! Грей, ты мой хороший...'); thoughtTimer = setTimeout(hideThought, 2500); break; case 'table': showThought('Кружка с чаем. Ещё тёплая.'); thoughtTimer = setTimeout(hideThought, 2000); break; case 'door': showThought('Заперто. Да и не хочется на улицу.'); thoughtTimer = setTimeout(hideThought, 2500); break; } }
            this.actionKey.on('down', doAction);
            this.checkZones = function() { if (scene.isInBed) { if (scene.storyStep >= 1) { scene.currentAction = 'krovat'; scene.actionButton.setAlpha(1); scene.actionButton.setText('[E] Встать'); } else { scene.currentAction = null; scene.actionButton.setAlpha(0); } return; } const zones = scene.getActionZones(); let found = null; for (const z of zones) { if (Phaser.Math.Distance.Between(scene.player.x, scene.player.y, z.x, z.y) < z.range) { found = z; break; } } if (found) { scene.currentAction = found.action; scene.actionButton.setAlpha(1); switch(found.action) { case 'krovat': scene.actionButton.setText(scene.storyStep===0?'[E] Лечь':'[E] Кровать'); break; case 'kamin': scene.actionButton.setText('[E] Камин'); break; case 'komod': scene.actionButton.setText('[E] Комод'); break; case 'cat': scene.actionButton.setText('[E] Погладить'); break; case 'table': scene.actionButton.setText('[E] Стол'); break; case 'door': scene.actionButton.setText('[E] Дверь'); break; } } else { scene.currentAction = null; scene.actionButton.setAlpha(0); } };
            this.updateInventoryUI = function() { const vis = scene.showInventory; scene.inventoryBg.setVisible(vis); scene.invTitle.setVisible(vis); scene.inventoryText.setVisible(vis); if (vis) scene.inventoryText.setText(scene.inventory.length === 0 ? '  (пусто)' : scene.inventory.map(i => '  • ' + i).join('\n')); };
            this.updateZoneGraphics = function() { scene.zoneGraphics.clear(); if (!scene.showZones) return; for (const z of scene.getActionZones()) { scene.zoneGraphics.fillStyle(z.color, 0.15); scene.zoneGraphics.fillCircle(z.x, z.y, z.range); scene.zoneGraphics.lineStyle(2, z.color, 0.6); scene.zoneGraphics.strokeCircle(z.x, z.y, z.range); } };
            this.time.delayedCall(100, () => { this.speedReady = true; });
            this.time.delayedCall(500, () => doStoryThought('Доброе утро... 14 лет? Не, я лучше дальше спать...', 3000));
            console.log('✅ Сцена 1');
        }

        update() {
            if (this.hKey && this.hKey.isDown && !this.hWasDown) { this.showCoords = !this.showCoords; if (this.coordsText) this.coordsText.setVisible(this.showCoords); } this.hWasDown = this.hKey ? this.hKey.isDown : false;
            if (this.showCoords && this.player && this.coordsText) this.coordsText.setText('X: ' + Math.floor(this.player.x) + ' | Y: ' + Math.floor(this.player.y));
            if (this.checkZones) this.checkZones(); if (this.updateInventoryUI) this.updateInventoryUI(); if (this.updateZoneGraphics) this.updateZoneGraphics();
            if (this.fKey && this.fKey.isDown && !this.fWasDown) { this.showDebug = !this.showDebug; if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = this.showDebug; this.physics.world.drawDebug = this.showDebug; } this.fWasDown = this.fKey ? this.fKey.isDown : false;
            if (this.gKey && this.gKey.isDown && !this.gWasDown) { this.showZones = !this.showZones; if (this.zoneGraphics) this.zoneGraphics.setVisible(this.showZones); } this.gWasDown = this.gKey ? this.gKey.isDown : false;
            if (this.qKey && this.qKey.isDown && !this.qWasDown) { this.showInventory = !this.showInventory; } this.qWasDown = this.qKey ? this.qKey.isDown : false;
            if (this.speedReady && !this.isInBed) { const speed = 250; if (!this.sys.game.device.os.desktop && this.joyStick) { if (this.joyStick.forceX !== 0 || this.joyStick.forceY !== 0) this.player.setVelocity(this.joyStick.forceX * speed, this.joyStick.forceY * speed); else this.player.setVelocity(0, 0); } else if (this.sys.game.device.os.desktop && this.wasd) { this.player.setVelocity(0); if (this.wasd.A && this.wasd.A.isDown) this.player.setVelocityX(-speed); if (this.wasd.D && this.wasd.D.isDown) this.player.setVelocityX(speed); if (this.wasd.W && this.wasd.W.isDown) this.player.setVelocityY(-speed); if (this.wasd.S && this.wasd.S.isDown) this.player.setVelocityY(speed); const vx = this.player.body.velocity.x, vy = this.player.body.velocity.y; if (vx !== 0 && vy !== 0) this.player.setVelocity(vx * speed / Math.sqrt(vx*vx+vy*vy), vy * speed / Math.sqrt(vx*vx+vy*vy)); } }
        }
    }

    // ==================== СЦЕНА 2: ДОМ ЛЮПИНА ====================
    class LupinScene extends Phaser.Scene {
        constructor() { super('LupinScene'); }
        create() {
            const W = 640, H = 480, worldW = 1600, worldH = 480; const S = 3;
            if (this.physics.world.debugGraphic) this.physics.world.debugGraphic.visible = false; this.physics.world.drawDebug = false;
            this.player = null; this.wasd = {}; this.actionButton = null; this.currentAction = null; this.thoughtText = null; this.actionKey = null;
            this.showDebug = false; this.fKey = null; this.fWasDown = false; this.showZones = false; this.gKey = null; this.gWasDown = false;
            this.qKey = null; this.qWasDown = false; this.hKey = null; this.hWasDown = false; this.showCoords = false; this.coordsText = null;
            this.inventory = []; this.inventoryText = null; this.inventoryBg = null; this.invTitle = null; this.showInventory = false;
            this.zoneGraphics = null; this.speedReady = false; this.metYulia = false; this.kiraOut = false; this.dialogueActive = false;

            const W = 640, H = 480;

            this.cameras.main.setBackgroundColor('#000000');

                sky.fillStyle(band.color, 1);

            });

            for (let i = 0; i < 40; i++) {

                const alpha = y < 150 ? Phaser.Math.Between(5, 10)/10 : Phaser.Math.Between(1, 4)/10;

            }

                [380, 370, 120], [440, 360, 80], [330, 375, 70],
                [520, 340, 100], [580, 350, 80], [550, 360, 60]

            ocean.setDepth(3);
            const oceanBands = [
                { y: skyHeight, h: 150, color: 0x115566 },
                { y: skyHeight + 150, h: 200, color: 0x0a3344 },
                { y: skyHeight + 350, h: 200, color: 0x051a22 },
                { y: skyHeight + 550, h: 250, color: 0x020a11 },
            ];
            oceanBands.forEach(band => {
                ocean.fillStyle(band.color, 1);
                ocean.fillRect(0, band.y, W, band.h + 1);
            });

            const waterSurface = this.add.graphics().setDepth(4);
            waterSurface.fillStyle(0x44bbcc, 0.6);
            waterSurface.fillRect(0, skyHeight, W, 3);
            waterSurface.fillStyle(0x66ddff, 0.3);
            waterSurface.fillRect(0, skyHeight + 3, W, 2);
            waterSurface.fillStyle(0x88eeff, 0.15);
            waterSurface.fillRect(0, skyHeight + 5, W, 2);

            for (let i = 0; i < 8; i++) {
                const bx = Phaser.Math.Between(20, W - 20);
                this.add.rectangle(bx, skyHeight, Phaser.Math.Between(20, 50), 2, 0xffffff, 0.2).setDepth(5);
            }

            const body = this.add.rectangle(W/2, 80, 40, 24, 0xCCCCCC);
            body.setStrokeStyle(2, 0xFFD700); body.setDepth(10);
            const nose = this.add.triangle(W/2, 55, 0, 10, 10, 0, 20, 10, 0xFF4444).setDepth(11);
            const fire = this.add.triangle(W/2, 75, 5, 0, 15, 8, 25, 0, 0xFF8800).setDepth(9);
            this.tweens.add({ targets: fire, scaleY: 1.4, duration: 150, yoyo: true, repeat: -1 });

            const titleText = this.add.text(W/2, 180, '', {
                fontSize: '18px', fill: '#ffffff', fontFamily: 'monospace',
                stroke: '#000000', strokeThickness: 3, align: 'center'
            }).setOrigin(0.5).setDepth(20).setAlpha(0).setScrollFactor(0);

            const darkOverlay = this.add.rectangle(W/2, skyHeight + 100, W, oceanDepth, 0x001122, 0);
            darkOverlay.setDepth(15);

            }

            this.cameras.main.setFollowOffset(0, -80);

                this.cameras.main.fadeOut(500, 0, 0, 0);
                this.time.delayedCall(500, () => this.scene.start('TitanicScene'));
            };

                    backgroundColor: '#333333', padding: { x: 10, y: 5 }

                skipBtn.on('pointerdown', skipToTitanic);
            }

            });

            });

            timeline.delayedCall(4000, () => {
                titleText.setText('Заходим на посадку!');

            });

                titleText.setText('Погружаемся...');
                scene.tweens.add({ targets: [body, nose, fire], y: skyHeight + 400, duration: 3500, ease: 'Quad.easeIn' });

                const spawnBubbles = (count, startY) => {
                    for (let i = 0; i < count; i++) {
                        scene.time.delayedCall(i * 60, () => {
                            const b = bubbles.find(b => !b.obj.visible);
                            if (!b) return;
                            b.obj.setVisible(true);
                            b.obj.y = startY + Phaser.Math.Between(0, 60);
                            b.obj.x = body.x + Phaser.Math.Between(-40, 40);
                            b.obj.alpha = 0.7;
                            scene.tweens.add({
                                targets: b.obj, y: b.obj.y - Phaser.Math.Between(60, 180),
                                x: b.obj.x + Phaser.Math.Between(-40, 40), alpha: 0,
                                duration: b.speed * 40, ease: 'Quad.easeOut',
                                onComplete: () => b.obj.setVisible(false)
                            });
                        });
                    }
                };

                spawnBubbles(10, skyHeight + 50);

            });

            timeline.delayedCall(9500, () => {
                scene.cameras.main.fadeOut(1000, 0, 0, 0);
                scene.time.delayedCall(1000, () => scene.scene.start('TitanicScene'));
            });

            console.log('✅ Сцена 6: Ныряние (с кнопкой пропуска).');
        }
    }
